<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>الدفع</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
  font-family:Arial;
  background:#f5f6fa;
  text-align:center;
  padding:20px;
}

.card{
  background:#fff;
  padding:20px;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  max-width:400px;
  margin:auto;
}

button{
  padding:10px;
  width:100%;
  border:none;
  border-radius:8px;
  margin-top:10px;
  cursor:pointer;
}

.copy{
  background:#3498db;
  color:white;
}

.pay{
  background:#27ae60;
  color:white;
}

input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

select{
  width:100%;
  padding:10px;
  border-radius:8px;
}

#timer{
  color:red;
  font-size:24px;
}
</style>

</head>

<body>

<div class="card">

<h2><i class="fa-solid fa-credit-card"></i> صفحة الدفع</h2>

<h1 id="timer">
<i class="fa-regular fa-clock"></i> 15:00
</h1>

<label><i class="fa-solid fa-network-wired"></i> اختر الشبكة</label>
<select id="network" onchange="updateWallet()">
  <option value="TRC20">USDT TRC20</option>
  <option value="BEP20">USDT BEP20</option>
</select>

<br><br>

<p><i class="fa-solid fa-location-dot"></i> العنوان</p>

<div style="background:#eee;padding:10px;border-radius:8px;">
  <b id="wallet"></b>
</div>

<button class="copy" onclick="copyAddress()">
  <i class="fa-regular fa-copy"></i> نسخ العنوان
</button>

<br><br>

<p><i class="fa-solid fa-qrcode"></i> QR Code</p>
<img id="qr" width="180">

<hr>

<input id="txid" placeholder="رقم العملية (TXID)">

<label><i class="fa-solid fa-upload"></i> رفع صورة التحويل</label>
<input type="file" id="proof">

<button class="pay" onclick="submitPayment()">
  <i class="fa-solid fa-check"></i> تأكيد الدفع
</button>

<p id="status">
  <i class="fa-solid fa-hourglass-half"></i> بانتظار الدفع
</p>

</div>

<script>

// المحافظ
const wallets = {
  TRC20: "TLPZEoW71BNe6mHPK8XRJ5PkN5Agqqpa5n",
  BEP20: "0x990635c24b47a3ebbc14efadf0355e26ec706385"
};

// تحديث العنوان + QR
function updateWallet(){
  const net = document.getElementById("network").value;
  const address = wallets[net];

  document.getElementById("wallet").innerText = address;

  document.getElementById("qr").src =
    "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=" + address;
}

updateWallet();

// نسخ
function copyAddress(){
  navigator.clipboard.writeText(document.getElementById("wallet").innerText);
  alert("تم النسخ");
}

// العداد 15 دقيقة
let time = 900;

setInterval(()=>{
  time--;

  let m = Math.floor(time/60);
  let s = time%60;

  document.getElementById("timer").innerHTML =
    '<i class="fa-regular fa-clock"></i> ' + m + ":" + (s<10?"0":"") + s;

  if(time <= 0){
    document.getElementById("status").innerHTML =
      '<i class="fa-solid fa-xmark"></i> انتهى الوقت';
  }

},1000);


// إرسال الدفع
async function submitPayment(){

  const email = localStorage.getItem("email");
  const amount = localStorage.getItem("amount");
  const packageName = localStorage.getItem("packageName");

  const txid = document.getElementById("txid").value;
  const file = document.getElementById("proof").files[0];

  if(!txid || !file){
    alert("أدخل رقم العملية وارفع الصورة");
    return;
  }

  // تسجيل العملية
  await fetch("/manual-deposit",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({email,amount,packageName})
  });

  // رفع الإثبات
  const formData = new FormData();
  formData.append("email",email);
  formData.append("txid",txid);
  formData.append("file",file);

  await fetch("/upload-proof",{
    method:"POST",
    body:formData
  });

  document.getElementById("status").innerHTML =
    '<i class="fa-solid fa-paper-plane"></i> تم الإرسال، في انتظار المراجعة';

}


// تحديث الحالة تلقائي
setInterval(async ()=>{

  const res = await fetch("/user-data",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      email: localStorage.getItem("email")
    })
  });

  const data = await res.json();

  const op = data.operations[0];

  if(op){

    if(op.status === "approved"){
      document.getElementById("status").innerHTML =
        '<i class="fa-solid fa-circle-check"></i> تم قبول الدفع';
    }

    if(op.status === "rejected"){
      document.getElementById("status").innerHTML =
        '<i class="fa-solid fa-circle-xmark"></i> تم رفض الدفع';
    }

  }

},3000);

</script>

</body>
</html>
