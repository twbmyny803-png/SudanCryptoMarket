<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>صفحة الدفع</title>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:#fff;
  margin:0;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  width:95%;
  max-width:400px;
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  text-align:center;
}

h2{
  margin-bottom:10px;
}

.timer{
  color:#ff4d4d;
  font-size:22px;
  margin-bottom:15px;
}

select, input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:none;
}

.btn{
  width:100%;
  padding:12px;
  background:#22c55e;
  border:none;
  color:#fff;
  border-radius:8px;
  font-size:16px;
  cursor:pointer;
}

.copy{
  background:#3b82f6;
  margin-top:5px;
}

.qr{
  margin:15px 0;
}

.status{
  margin-top:10px;
  font-size:14px;
}
</style>

</head>

<body>

<div class="container">

<h2>صفحة الدفع</h2>

<!-- 🔥 بيانات الطلب -->
<div style="background:#334155;padding:10px;border-radius:8px;margin-bottom:10px;">
  <div>رقم الطلب: <b id="orderId"></b></div>
  <div>الباقة: <b id="packageName"></b></div>
  <div>المبلغ: <b id="amount"></b> USDT</div>
</div>

<div id="timer" class="timer">15:00</div>

<select id="network" onchange="startTimer()">
  <option value="">اختر الشبكة</option>
  <option value="TRC20">USDT TRC20</option>
  <option value="BEP20">USDT BEP20</option>
</select>

<div id="addressBox"></div>

<div class="qr">
  <canvas id="qrcode"></canvas>
</div>

<input type="text" id="txid" placeholder="رقم العملية (TXID)">
<input type="file" id="proof">

<button class="btn" onclick="submitPayment()">تأكيد الدفع</button>

<div id="status" class="status">في انتظار الدفع...</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script>

// 🔥 بيانات من الخطوات السابقة
const orderId = localStorage.getItem("orderId");
const packageName = localStorage.getItem("selectedPackage");
const amount = localStorage.getItem("selectedPrice");

// 🔴 حماية
if(!orderId){
  alert("لا يوجد طلب");
  window.location.href = "packages.html";
}

// عرض البيانات
document.getElementById("orderId").innerText = orderId || "-";
document.getElementById("packageName").innerText = packageName || "-";
document.getElementById("amount").innerText = amount || "-";

const TRC20 = "TLPZEoW71BNe6mHPK8XRJ5PkN5Agqqpa5n";
const BEP20 = "0x990635c24b47a3ebbc14efadf0355e26ec706385";

let timerStarted = false;
let time = 900;
let sent = false;
let approvedOnce = false;

const successSound = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");

function showPopup(message,color){
  let popup = document.createElement("div");

  popup.innerText = message;
  popup.style.position="fixed";
  popup.style.bottom="20px";
  popup.style.left="50%";
  popup.style.transform="translateX(-50%)";
  popup.style.background=color;
  popup.style.color="#fff";
  popup.style.padding="12px 20px";
  popup.style.borderRadius="8px";

  document.body.appendChild(popup);
  setTimeout(()=>popup.remove(),3000);
}

// 🔥 يبدأ بعد اختيار الشبكة فقط
function startTimer(){

  if(timerStarted) return;

  const net = document.getElementById("network").value;
  if(!net) return;

  timerStarted = true;

  let address = net === "TRC20" ? TRC20 : BEP20;

  document.getElementById("addressBox").innerHTML = `
    <div>${address}</div>
    <button class="btn copy" onclick="copyAddress('${address}')">نسخ العنوان</button>
  `;

  QRCode.toCanvas(document.getElementById("qrcode"), address);

  setInterval(()=>{
    time--;

    let min = Math.floor(time/60);
    let sec = time % 60;

    document.getElementById("timer").innerText =
      `${min}:${sec < 10 ? "0"+sec : sec}`;

    if(time <= 0){
      document.getElementById("status").innerText="انتهى الوقت";
    }

  },1000);
}

function copyAddress(addr){
  navigator.clipboard.writeText(addr);
  showPopup("تم النسخ", "blue");
}

// 🔥 إرسال بدون تخريب
async function submitPayment(){

  if(sent){
    showPopup("تم الإرسال بالفعل","red");
    return;
  }

  const email = localStorage.getItem("userEmail");

  const txid = document.getElementById("txid").value;
  const file = document.getElementById("proof").files[0];

  if(!txid || !file){
    showPopup("أدخل البيانات كاملة","red");
    return;
  }

  sent = true;

  document.getElementById("status").innerText="جاري الإرسال...";

  const formData = new FormData();
  formData.append("email",email);
  formData.append("txid",txid);
  formData.append("file",file);

  await fetch("/upload-proof",{
    method:"POST",
    body:formData
  });

  showPopup("تم الإرسال","orange");
}

// 🔥 تحديث الحالة مباشر
setInterval(async ()=>{

  const res = await fetch("/user-data",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      email: localStorage.getItem("userEmail")
    })
  });

  const data = await res.json();
  const op = data.operations[0];

  if(!op) return;

  if(op.status === "approved" && !approvedOnce){

    approvedOnce = true;

    document.getElementById("status").innerText="تم القبول";
    document.getElementById("status").style.color="green";

    successSound.play();

    showPopup("تم القبول بنجاح","green");

    setTimeout(()=>{
      window.location.href="dashboard.html";
    },3000);

  }

  if(op.status === "rejected"){
    document.getElementById("status").innerText="مرفوض";
    showPopup("تم الرفض","red");
  }

},3000);

</script>

</body>
</html>
