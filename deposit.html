<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إيداع | سودان كربتو</title>

<style>
body{
margin:0;
font-family:Tahoma;
background:#f2f5fa;
}

.header{
background:#0b1f3a;
color:white;
padding:18px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.container{
max-width:600px;
margin:auto;
padding:20px;
}

.card{
background:white;
border-radius:12px;
padding:18px;
margin-bottom:16px;
box-shadow:0 6px 16px rgba(0,0,0,0.08);
}

.title{
font-weight:bold;
margin-bottom:10px;
}

select,input{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ddd;
margin-top:6px;
}

.address{
background:#f7f9fc;
padding:12px;
border-radius:8px;
word-break:break-all;
margin-top:8px;
font-size:14px;
}

.copy{
background:#2D6AF6;
color:white;
border:none;
padding:10px;
margin-top:10px;
border-radius:6px;
cursor:pointer;
width:100%;
}

.timer{
text-align:center;
font-size:34px;
font-weight:bold;
color:#e74c3c;
margin-top:10px;
}

.status{
text-align:center;
font-size:22px;
font-weight:bold;
color:#ff9800;
margin-top:10px;
}

.note{
font-size:13px;
color:#666;
margin-top:6px;
}

.submit{
background:#10B981;
color:white;
border:none;
padding:12px;
border-radius:8px;
width:100%;
margin-top:12px;
font-size:16px;
cursor:pointer;
}

.warning{
color:#e74c3c;
font-size:13px;
margin-top:8px;
}

.package-box{
background:#eef5ff;
border:1px solid #d7e7ff;
border-radius:10px;
padding:14px;
line-height:1.9;
}

.package-row{
font-size:14px;
color:#1f2937;
}

.package-row b{
color:#0b1f3a;
}
</style>
</head>

<body>

<div class="header">
إيداع العملات
</div>

<div class="container">

<div class="card" id="selectedPackageCard" style="display:none;">
<div class="title">تفاصيل الباقة المختارة</div>

<div class="package-box">
<div class="package-row">اسم الباقة: <b id="packageName">-</b></div>
<div class="package-row">سعر الباقة: <b id="packagePrice">-</b></div>
<div class="package-row">الربح اليومي: <b id="packageDailyProfit">-</b></div>
<div class="package-row">مدة الباقة: <b id="packageDuration">-</b></div>
</div>

<div class="note">
بعد إتمام الإيداع وإرسال الطلب، ستتم مراجعة العملية ثم اعتماد الباقة.
</div>
</div>

<div class="card">

<div class="title">الإيداع</div>

<input type="number" id="amount" placeholder="أدخل مبلغ الإيداع">

<button class="submit" onclick="payNow()">
ادفع الآن 💳
</button>

<div class="note">
سيتم تحويلك مباشرة لصفحة الدفع الآمنة (NowPayments)
</div>

</div>

</div>

<script>
const API="https://sudancryptomarket-api.onrender.com"

const email=localStorage.getItem("userEmail")

if(!email){
  window.location.href="login.html"
}

const selectedPackage=localStorage.getItem("selectedPackage")
const selectedPrice=localStorage.getItem("selectedPrice")
const selectedDailyProfit=localStorage.getItem("selectedDailyProfit")
const selectedDuration=localStorage.getItem("selectedDuration")

if(selectedPackage && selectedPrice){
  document.getElementById("selectedPackageCard").style.display="block"
  document.getElementById("packageName").innerText=selectedPackage
  document.getElementById("packagePrice").innerText=selectedPrice+" USDT"
  document.getElementById("packageDailyProfit").innerText=selectedDailyProfit+" USDT"
  document.getElementById("packageDuration").innerText=selectedDuration+" يوم"
  document.getElementById("amount").value=selectedPrice
}

async function payNow(){

  const amount = Number(document.getElementById("amount").value);
  const packageName = localStorage.getItem("selectedPackage"); // 🔥 جلب اسم الباقة من التخزين المحلي

  if(!amount || amount <= 0){
    alert("أدخل مبلغ صحيح");
    return;
  }

  if(!packageName){
    alert("يرجى اختيار باقة أولاً");
    return;
  }

  try {

    const res = await fetch(API + "/create-payment", {
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body: JSON.stringify({
        email: email,
        amount: amount,
        packageName: packageName // 🔥 إرسال اسم الباقة للسيرفر
      })
    });

    const data = await res.json();

    if(data.success && data.url){
      window.location.href = data.url; // 🔥 تحويل مباشر لصفحة الدفع
    }else{
      alert("فشل إنشاء الدفع: " + (data.message || "خطأ غير معروف"));
    }

  } catch (e) {
    alert("حدث خطأ في الاتصال بالسيرفر");
  }
}
</script>

</body>
</html>
