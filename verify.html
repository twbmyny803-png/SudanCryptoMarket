<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>تحقق البريد | سودان كربتو</title>

<style>

body{
margin:0;
font-family:Tahoma,Arial;
background:linear-gradient(135deg,#07162b,#0b1f3a,#12345c);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.container{
width:100%;
max-width:380px;
background:#dcebff;
border-radius:18px;
padding:25px;
box-shadow:0 15px 40px rgba(0,0,0,0.3);
text-align:center;
}

.logo{
font-size:22px;
font-weight:bold;
color:#2D6AF6;
margin-bottom:5px;
}

.subtitle{
font-size:12px;
color:#555;
margin-bottom:20px;
}

h2{
margin-bottom:10px;
}

.code-box{
display:flex;
justify-content:center;
gap:8px;
margin:20px 0;
}

.code-box input{
width:40px;
height:45px;
font-size:20px;
text-align:center;
border-radius:8px;
border:1px solid #ccc;
outline:none;
}

.code-box input:focus{
border-color:#2D6AF6;
box-shadow:0 0 5px rgba(45,106,246,0.4);
}

.verify-btn{
width:100%;
height:45px;
border:none;
border-radius:8px;
background:#2D6AF6;
color:white;
font-size:15px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

.timer{
margin-top:15px;
font-size:13px;
color:#444;
}

.resend{
margin-top:10px;
font-size:14px;
color:#2D6AF6;
cursor:pointer;
display:none;
}

footer{
margin-top:15px;
font-size:11px;
color:#333;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">سودان كربتو</div>
<div class="subtitle">تم إرسال كود التحقق إلى بريدك الإلكتروني</div>

<h2>أدخل كود التحقق</h2>

<div class="code-box">
<input type="text" maxlength="1">
<input type="text" maxlength="1">
<input type="text" maxlength="1">
<input type="text" maxlength="1">
<input type="text" maxlength="1">
<input type="text" maxlength="1">
</div>

<button class="verify-btn">تأكيد الكود</button>

<div class="timer">
إعادة إرسال الكود خلال <span id="count">60</span> ثانية
</div>

<div class="resend" id="resend">
إرسال كود جديد
</div>

<footer>
© سودان كربتو – جميع الحقوق محفوظة
</footer>

</div>

<script>

let inputs=document.querySelectorAll(".code-box input")

inputs.forEach((input,index)=>{
input.addEventListener("input",()=>{
if(input.value.length==1 && index<5){
inputs[index+1].focus()
}
})
})

let time=60
let count=document.getElementById("count")
let resend=document.getElementById("resend")

let timer=setInterval(()=>{

time--
count.innerText=time

if(time<=0){

clearInterval(timer)
count.innerText="0"
resend.style.display="block"

}

},1000)

</script>

</body>
</html>
