<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول | سودان كربتو</title>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:Tahoma, Arial, sans-serif;
background:linear-gradient(135deg,#07162b,#0b1f3a,#12345c);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:12px;
}

.container{
width:100%;
max-width:380px;
background:#dcebff;
border-radius:18px;
padding:22px 18px;
box-shadow:0 18px 45px rgba(0,0,0,0.28);
border:1px solid rgba(255,255,255,0.35);
}

.logo{
text-align:center;
font-size:22px;
font-weight:700;
color:#2D6AF6;
margin-bottom:4px;
}

.subtitle{
text-align:center;
color:#42526b;
font-size:12px;
margin-bottom:14px;
}

h2{
margin:0 0 14px;
text-align:center;
color:#1A1A1A;
font-size:20px;
}

label{
display:block;
margin-top:8px;
margin-bottom:4px;
font-size:13px;
font-weight:700;
color:#1A1A1A;
}

input{
width:100%;
height:42px;
border:1px solid #bfd0ea;
border-radius:8px;
padding:0 12px;
font-size:13px;
background:#f7fbff;
outline:none;
}

input:focus{
border-color:#2D6AF6;
box-shadow:0 0 0 3px rgba(45,106,246,0.12);
background:#ffffff;
}

.password-wrap{
position:relative;
}

.password-wrap input{
padding-left:74px;
}

.toggle-password{
position:absolute;
left:8px;
top:50%;
transform:translateY(-50%);
height:28px;
padding:0 10px;
border:none;
border-radius:6px;
background:#2D6AF6;
color:#fff;
font-size:11px;
font-weight:700;
cursor:pointer;
}

.login-btn{
width:100%;
height:44px;
border:none;
border-radius:8px;
font-size:14px;
font-weight:700;
cursor:pointer;
margin-top:12px;
background:#10B981;
color:#fff;
}

.status-message{
margin-top:10px;
font-size:13px;
font-weight:700;
display:none;
color:#e74c3c;
text-align:center;
}

.links{
text-align:center;
margin-top:12px;
}

.links a{
display:block;
text-decoration:none;
color:#2D6AF6;
font-size:13px;
font-weight:700;
margin-top:6px;
}

footer{
text-align:center;
margin-top:14px;
font-size:11px;
color:#314057;
font-weight:600;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">سودان كربتو</div>
<div class="subtitle">تسجيل الدخول إلى حسابك</div>

<h2>تسجيل الدخول</h2>

<label>البريد الإلكتروني</label>
<input type="email" id="email" placeholder="اكتب البريد الإلكتروني">

<label>كلمة السر</label>

<div class="password-wrap">
<input type="password" id="password" placeholder="اكتب كلمة السر">
<button type="button" class="toggle-password" onclick="togglePassword()">إظهار</button>
</div>

<button class="login-btn" onclick="loginNow()">دخول</button>

<div class="status-message" id="statusMessage"></div>

<div class="links">
<a href="forgot.html">هل نسيت كلمة السر؟</a>
<a href="index.html">إنشاء حساب جديد</a>
</div>

<footer>© سودان كربتو</footer>

</div>

<script>
const API_BASE="https://sudancryptomarket-api.onrender.com";

function togglePassword(){
const input=document.getElementById("password");
const button=document.querySelector(".toggle-password");

if(input.type==="password"){
input.type="text";
button.textContent="إخفاء";
}else{
input.type="password";
button.textContent="إظهار";
}
}

function showStatus(msg){
const box=document.getElementById("statusMessage");
box.textContent=msg;
box.style.display="block";
}

function clearStatus(){
document.getElementById("statusMessage").style.display="none";
}

function loginNow(){
const email=document.getElementById("email").value.trim();
const password=document.getElementById("password").value.trim();

clearStatus();

if(email===""){
showStatus("اكتب البريد الإلكتروني");
return;
}

if(password===""){
showStatus("اكتب كلمة السر");
return;
}

fetch(`${API_BASE}/login`,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
email,
password
})
})
.then(res=>res.json())
.then(data=>{

if(data.success===false){
throw new Error(data.message || "فشل تسجيل الدخول");
}

localStorage.setItem("userEmail",email);
window.location.href="dashboard.html";

})
.catch(err=>{
showStatus(err.message || "حدث خطأ أثناء تسجيل الدخول");
});
}
</script>

</body>
</html>
