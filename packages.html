<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>الباقات الاستثمارية</title>

<style>

body{
margin:0;
font-family:Tahoma;
background:#f2f5fa;
}

.header{
background:#0b1f3a;
color:white;
padding:18px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.container{
max-width:600px;
margin:auto;
padding:20px;
}

.package{

background:white;
border-radius:14px;
padding:20px;
margin-bottom:16px;
box-shadow:0 6px 16px rgba(0,0,0,0.08);
text-align:center;

}

.package h2{
margin:0 0 10px;
}

.price{
font-size:26px;
color:#2D6AF6;
font-weight:bold;
margin-bottom:8px;
}

.profit{
color:#10B981;
font-weight:bold;
margin-bottom:6px;
}

.duration{
color:#777;
margin-bottom:16px;
}

.buy-btn{

background:#2D6AF6;
color:white;
border:none;
padding:12px;
width:100%;
border-radius:8px;
font-size:16px;
cursor:pointer;

}

.buy-btn:hover{
opacity:0.9;
}

</style>
</head>

<body>

<div class="header">
الباقات الاستثمارية
</div>

<div class="container">

<!-- Starter -->

<div class="package">

<h2>Starter</h2>

<div class="price">
USDT 50
</div>

<div class="profit">
ربح يومي 2.5 USDT
</div>

<div class="duration">
مدة الباقة 280 يوم
</div>

<button class="buy-btn" onclick="buyPackage('Starter',50)">
انقر للشراء
</button>

</div>


<!-- Silver -->

<div class="package">

<h2>Silver</h2>

<div class="price">
USDT 100
</div>

<div class="profit">
ربح يومي 5 USDT
</div>

<div class="duration">
مدة الباقة 280 يوم
</div>

<button class="buy-btn" onclick="buyPackage('Silver',100)">
انقر للشراء
</button>

</div>


<!-- Gold -->

<div class="package">

<h2>Gold</h2>

<div class="price">
USDT 250
</div>

<div class="profit">
ربح يومي 8 USDT
</div>

<div class="duration">
مدة الباقة 280 يوم
</div>

<button class="buy-btn" onclick="buyPackage('Gold',250)">
انقر للشراء
</button>

</div>


<!-- Diamond -->

<div class="package">

<h2>Diamond</h2>

<div class="price">
USDT 500
</div>

<div class="profit">
ربح يومي 12 USDT
</div>

<div class="duration">
مدة الباقة 280 يوم
</div>

<button class="buy-btn" onclick="buyPackage('Diamond',500)">
انقر للشراء
</button>

</div>


<!-- Platinum -->

<div class="package">

<h2>Platinum</h2>

<div class="price">
USDT 1000
</div>

<div class="profit">
ربح يومي 25 USDT
</div>

<div class="duration">
مدة الباقة 280 يوم
</div>

<button class="buy-btn" onclick="buyPackage('Platinum',1000)">
انقر للشراء
</button>

</div>

</div>

<script>

function buyPackage(name,price){

// حفظ الباقة المختارة
localStorage.setItem("selectedPackage",name)
localStorage.setItem("selectedPrice",price)

// لاحقاً سنربطها بصفحة الإيداع
window.location.href="deposit.html"

}

</script>

</body>
</html>
