*{box-sizing:border-box}

body{
margin:0;
font-family:Tahoma,Arial,sans-serif;
background:linear-gradient(135deg,#07162b,#0b1f3a,#12345c);
min-height:100vh;
}

.app{
max-width:420px;

background:#f4f8ff;
}

.topbar{
background:linear-gradient(135deg,#0f4ea8,#0d6efd,#17a2b8);

}

.topbar-row{

}

.brand{

.icon-btn{

height:38px;

font-size:16px;

align-items:center;
justify-content:center;
}

.welcome-box{
margin-top:14px;
background:rgba(255,255,255,.15);

.content{

.banner{
background:#fff;

padding:14px;

gap:10px;
align-items:center;
}

.banner-art{
width:110px;
height:110px;
border-radius:16px;
background:linear-gradient(135deg,#e0f2fe,#bae6fd);

align-items:center;
justify-content:center;
font-size:48px;
color:#0f172a;
}

.banner-text h3{
margin:0 0 6px;
}

.banner-text p{
margin:0 0 8px;
font-size:13px;
color:#555;
}

.banner-badge{
background:#22c55e;
color:#fff;
padding:6px 10px;
border-radius:8px;
font-size:12px;
}

.section-title{
margin:18px 0 10px;

.actions-grid{
display:grid;
grid-template-columns:repeat(3,1fr);

.action-item{

height:56px;

align-items:center;
justify-content:center;

color:#fff;

.c1{background:#a855f7}
.c2{background:#f59e0b}
.c3{background:#10b981}

.action-text{
font-size:13px;
font-weight:bold;
}

.stats-grid{
margin-top:14px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.stat-card{
background:#fff;
border-radius:16px;
padding:14px;
}

.stat-label{
font-size:12px;
color:#666;
}

.stat-value{
font-size:20px;
font-weight:bold;
margin:6px 0;

.stat-sub{
