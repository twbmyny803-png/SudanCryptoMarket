<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سودان كربتو | الرئيسية</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:Tahoma,Arial,sans-serif;
background:linear-gradient(135deg,#07162b,#0b1f3a,#12345c);
min-height:100vh;
}

.app{
max-width:420px;
margin:auto;
min-height:100vh;
background:#f4f8ff;
}

.topbar{
background:linear-gradient(135deg,#0f4ea8,#0d6efd,#17a2b8);
color:#fff;
padding:16px;
border-bottom-left-radius:24px;
border-bottom-right-radius:24px;
}

.welcome-box{
margin-top:14px;
background:rgba(255,255,255,.15);
padding:12px;
border-radius:16px;
}

.content{
padding:14px 14px 90px;
}

.section-title{
margin:18px 0 10px;
font-weight:bold;
}

.actions-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
background:#fff;
padding:14px;
border-radius:18px;
}

.action-item{
text-align:center;
cursor:pointer;
}

.action-icon{
width:56px;
height:56px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
color:#fff;
margin:auto auto 6px;
}

.c1{background:#a855f7}
.c2{background:#f59e0b}
.c3{background:#10b981}

.bottom-nav{
position:fixed;
bottom:0;
left:50%;
transform:translateX(-50%);
width:100%;
max-width:420px;
background:#fff;
display:grid;
grid-template-columns:repeat(5,1fr);
padding:10px 6px;
}
</style>
</head>

<body>

<div class="app">

<div class="topbar">
<h2>سودان كربتو</h2>

<div class="welcome-box">
مرحباً، <span id="userName">...</span>
</div>
</div>

<div class="content">

<div class="section-title">الخدمات الرئيسية</div>

<div class="actions-grid">

<div class="action-item" onclick="location.href='packages.html'">
<div class="action-icon c3"><i class="fa-solid fa-sack-dollar"></i></div>
<div>الباقات</div>
</div>

<div class="action-item" onclick="location.href='referrals.html'">
<div class="action-icon c2"><i class="fa-solid fa-users"></i></div>
<div>فريقي</div>
</div>

<div class="action-item" onclick="startDeposit()">
<div class="action-icon c1"><i class="fa-solid fa-wallet"></i></div>
<div>إيداع</div>
</div>

</div>

<br>

<div style="background:#fff;padding:14px;border-radius:14px;">
<div>الرصيد: <b id="balance">0</b></div>
<div>الأرباح: <b id="income">0</b></div>
<div>الباقة: <b id="package">-</b></div>
</div>

<br>

<div style="background:#fff;padding:14px;border-radius:14px;">
<div>رمز الإحالة</div>
<input id="myRefCode" readonly style="width:100%">
<button onclick="copyRefCode()">نسخ</button>

<br><br>

<div>رابط الإحالة</div>
<input id="myRefLink" readonly style="width:100%">
<button onclick="copyRefLink()">نسخ</button>
</div>

</div>

</div>

<script>

const API="https://sudancryptomarket-api.onrender.com"
const email = localStorage.getItem("userEmail")

// 🔥 بدء إيداع (حل المشكلة)
function startDeposit(){
  localStorage.removeItem("activeOrder")
  localStorage.removeItem("orderId")
  localStorage.removeItem("selectedNetwork")
  window.location.href = "packages.html"
}

// 🔥 تحميل بيانات المستخدم
if(!email){
  location.href="login.html"
}else{

fetch(API+"/user-data",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({email})
})
.then(r=>r.json())
.then(data=>{

  if(!data.success){
    localStorage.removeItem("userEmail")
    location.href="login.html"
    return
  }

  document.getElementById("userName").innerText = data.name || "مستخدم";
  document.getElementById("balance").innerText = (data.balance || 0) + " USDT";
  document.getElementById("income").innerText = (data.incomeBalance || 0) + " USDT";
  document.getElementById("package").innerText = data.packageName || "لا توجد";

  document.getElementById("myRefCode").value = data.refCode || "";

  const link = window.location.origin + "/index.html?ref=" + (data.refCode || "");
  document.getElementById("myRefLink").value = link;

})

}

// نسخ
function copyRefCode(){
  navigator.clipboard.writeText(document.getElementById("myRefCode").value)
  alert("تم النسخ")
}

function copyRefLink(){
  navigator.clipboard.writeText(document.getElementById("myRefLink").value)
  alert("تم النسخ")
}

</script>

</body>
      </html>
