<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اختيار الشبكة</title>

<style>
body{
margin:0;
font-family:Tahoma, Arial;
background:#0f172a;
color:#fff;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.box{
width:100%;
max-width:420px;
background:#1e293b;
border-radius:14px;
padding:20px;
text-align:center;
}

h2{
margin-bottom:15px;
}

.info{
background:#0b1220;
padding:12px;
border-radius:10px;
margin-bottom:15px;
text-align:right;
}

.warning{
background:#3b2f0a;
color:#ffd76a;
padding:12px;
border-radius:10px;
margin-bottom:15px;
text-align:right;
}

.network-btn{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:10px;
background:#334155;
color:#fff;
font-size:16px;
cursor:pointer;
}

.network-btn:hover{
background:#2563eb;
}
</style>
</head>

<body>

<div class="box">

<h2>اختيار الشبكة</h2>

<div class="info">
<div>اسم الباقة: <b id="packageName"></b></div>
<div>المبلغ: <b id="amount"></b> USDT</div>
<div>الربح اليومي: <b id="dailyProfit"></b> USDT</div>
<div>مدة الباقة: <b id="duration"></b> يوم</div>
</div>

<div class="warning">
⚠ لا يمكن إنشاء أكثر من طلب مفتوح
</div>

<button class="network-btn" onclick="selectNetwork('TRC20')">USDT TRC20</button>
<button class="network-btn" onclick="selectNetwork('BEP20')">USDT BEP20</button>

</div>

<script>

const API="https://sudancryptomarket-api.onrender.com";
const email=localStorage.getItem("userEmail");

// عرض البيانات
document.getElementById("packageName").innerText = localStorage.getItem("selectedPackage") || "-";
document.getElementById("amount").innerText = localStorage.getItem("selectedPrice") || "-";
document.getElementById("dailyProfit").innerText = localStorage.getItem("selectedDailyProfit") || "-";
document.getElementById("duration").innerText = localStorage.getItem("selectedDuration") || "-";

// 🔥 أهم دالة (فحص الطلب من السيرفر)
async function checkPending(){

const res = await fetch(API+"/user-data",{
method:"POST",
headers:{"Content-Type":"application/json"},
body: JSON.stringify({email})
});

const data = await res.json();

if(!data.success) return false;

const pending = (data.operations || []).find(op =>
(op.type==="package_deposit" || op.type==="deposit") &&
op.status==="pending"
);

return pending || false;

}


// 🔥 اختيار الشبكة
async function selectNetwork(network){

const pending = await checkPending();

if(pending){

// 🔥 لو في طلب → رجعو لصفحة الدفع
localStorage.setItem("selectedNetwork", pending.network || "TRC20");

window.location.href="deposit.html";
return;

}

// 🔥 إنشاء طلب جديد
const res = await fetch(API+"/manual-deposit",{
method:"POST",
headers:{"Content-Type":"application/json"},
body: JSON.stringify({
email:email,
amount:localStorage.getItem("selectedPrice"),
packageName:localStorage.getItem("selectedPackage")
})
});

const data = await res.json();

if(!data.success){
alert(data.message);
return;
}

localStorage.setItem("selectedNetwork", network);

// 🔥 orderId بسيط
localStorage.setItem("orderId","ORD"+Date.now());

window.location.href="deposit.html";

}

</script>

</body>
</html>
