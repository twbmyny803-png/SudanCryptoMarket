<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>اختيار الشبكة</title>

<style>
body{
  background:#0f172a;
  color:#fff;
  font-family:Tahoma;
  text-align:center;
  padding:40px;
}

.box{
  max-width:400px;
  margin:auto;
  background:#1e293b;
  padding:20px;
  border-radius:12px;
}

button{
  width:100%;
  padding:15px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:#fff;
  font-size:16px;
  cursor:pointer;
}
</style>

</head>

<body>

<div class="box">

<h2>اختار الشبكة</h2>

<div id="info"></div>

<button onclick="selectNetwork('TRC20')">USDT TRC20</button>
<button onclick="selectNetwork('BEP20')">USDT BEP20</button>

</div>

<script>

// البيانات
const packageName = localStorage.getItem("selectedPackage");
const price = localStorage.getItem("selectedPrice");
const orderId = localStorage.getItem("orderId");

// حماية
if(!packageName || !orderId){
  alert("ارجع للباقات");
  window.location.href="packages.html";
}

// عرض
document.getElementById("info").innerHTML = `
الباقة: ${packageName} <br>
المبلغ: ${price} USDT <br>
رقم الطلب: ${orderId}
`;

// اختيار الشبكة
function selectNetwork(network){

  localStorage.setItem("selectedNetwork", network);

  // 🔥 الانتقال للدفع
  window.location.href = "deposit.html";
}

</script>

</body>
</html>
