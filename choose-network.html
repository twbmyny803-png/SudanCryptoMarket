<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اختيار الشبكة</title>

<style>
body{
font-family:Tahoma;
background:#0f172a;
color:#fff;
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
width:90%;
max-width:400px;
background:#1e293b;
padding:20px;
border-radius:12px;
text-align:center;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.trc{background:#22c55e;color:#fff;}
.bep{background:#3b82f6;color:#fff;}
</style>

</head>

<body>

<div class="box">

<h2>اختيار شبكة الدفع</h2>

<p>اختر الشبكة المناسبة قبل المتابعة</p>

<button class="trc" onclick="selectNetwork('TRC20')">
USDT TRC20
</button>

<button class="bep" onclick="selectNetwork('BEP20')">
USDT BEP20
</button>

</div>

<script>

// منع الطلب المتكرر
if(localStorage.getItem("activeOrder")){
alert("عندك طلب قيد التنفيذ");
window.location.href="deposit.html";
}

function generateOrderId(){
return "ORD-" + Date.now();
}

function selectNetwork(net){

// حفظ الشبكة
localStorage.setItem("selectedNetwork", net);

// إنشاء رقم طلب
const orderId = generateOrderId();
localStorage.setItem("orderId", orderId);

// قفل الطلب
localStorage.setItem("activeOrder", "true");

// 🔥 إنشاء الطلب في السيرفر
fetch("https://sudancryptomarket-api.onrender.com/manual-deposit",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify({
email: localStorage.getItem("userEmail"),
amount: localStorage.getItem("selectedPrice"),
packageName: localStorage.getItem("selectedPackage")
})
});

// تحويل
window.location.href="deposit.html";

}

</script>

</body>
</html>
