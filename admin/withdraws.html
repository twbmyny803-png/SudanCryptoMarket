<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>طلبات السحب</title>

<style>
body{
font-family:Tahoma;
margin:0;
background:#f2f5fa;
}

.header{
background:#0b1f3a;
color:white;
padding:18px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.container{
padding:20px;
max-width:1100px;
margin:auto;
}

table{
width:100%;
border-collapse:collapse;
background:white;
box-shadow:0 6px 16px rgba(0,0,0,0.08);
border-radius:12px;
overflow:hidden;
}

th,td{
padding:12px;
border-bottom:1px solid #eee;
text-align:center;
font-size:14px;
}

th{
background:#f4f6fb;
}

button{
padding:8px 12px;
border:none;
border-radius:6px;
cursor:pointer;
font-size:13px;
margin:2px;
}

.approve{
background:#2ecc71;
color:white;
}

.reject{
background:#e74c3c;
color:white;
}

.pending{color:#f39c12;font-weight:bold;}
.approved{color:#27ae60;font-weight:bold;}
.rejected{color:#e74c3c;font-weight:bold;}
</style>

</head>

<body>

<div class="header">طلبات السحب</div>

<div class="container">

<button onclick="loadWithdraws()" style="margin-bottom:10px;padding:10px;background:#2D6AF6;color:white;border:none;border-radius:8px;">
تحديث
</button>

<table>

<thead>
<tr>
<th>البريد</th>
<th>المبلغ</th>
<th>الشبكة</th>
<th>الحالة</th>
<th>التاريخ</th>
<th>التحكم</th>
</tr>
</thead>

<tbody id="withdrawsTable"></tbody>

</table>

</div>

<script>

const API="https://sudancryptomarket-api.onrender.com";
const adminToken=localStorage.getItem("adminToken");

if(!adminToken){
window.location.href="login.html";
}

function getStatusClass(status){
if(status==="approved") return "approved";
if(status==="rejected") return "rejected";
return "pending";
}

function getStatusText(status){
if(status==="approved") return "تمت الموافقة";
if(status==="rejected") return "مرفوض";
return "قيد المراجعة";
}

async function loadWithdraws(){

document.getElementById("withdrawsTable").innerHTML="<tr><td colspan='6'>جاري التحميل...</td></tr>";

try{

const res=await fetch(API+"/admin-withdraws",{
headers:{
"x-admin-token":adminToken
}
});

const data=await res.json();

if(!data.success){
alert(data.message||"فشل التحميل");
return;
}

let html="";

(data.withdraws||[]).forEach(w=>{

html+=`
<tr>

<td>${w.email}</td>

<td>${w.amount} USDT</td>

<td>${w.network || "-"}</td>

<td class="${getStatusClass(w.status)}">${getStatusText(w.status)}</td>

<td>${w.index}</td>

<td>

<button class="approve" onclick="approveWithdraw('${w.email}',${w.index})">موافقة</button>

<button class="reject" onclick="rejectWithdraw('${w.email}',${w.index})">رفض</button>

</td>

</tr>
`;

});

document.getElementById("withdrawsTable").innerHTML =
html || `<tr><td colspan="6">لا توجد طلبات</td></tr>`;

}catch(e){

document.getElementById("withdrawsTable").innerHTML =
"<tr><td colspan='6'>خطأ في الاتصال</td></tr>";

}

}

function approveWithdraw(email,index){

fetch(API+"/admin-approve-withdraw",{
method:"POST",
headers:{
"Content-Type":"application/json",
"x-admin-token":adminToken
},
body:JSON.stringify({email,index})
})
.then(res=>res.json())
.then(data=>{
if(data.success){
alert("تمت الموافقة");
loadWithdraws();
}else{
alert(data.message||"فشل");
}
});

}

function rejectWithdraw(email,index){

fetch(API+"/admin-reject-withdraw",{
method:"POST",
headers:{
"Content-Type":"application/json",
"x-admin-token":adminToken
},
body:JSON.stringify({email,index})
})
.then(res=>res.json())
.then(data=>{
if(data.success){
alert("تم الرفض");
loadWithdraws();
}else{
alert(data.message||"فشل");
}
});

}

/* 🔥 تحديث تلقائي */
setInterval(()=>{
loadWithdraws();
},5000);

loadWithdraws();

</script>

</body>
</html>
