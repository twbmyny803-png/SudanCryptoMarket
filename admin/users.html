<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>إدارة المستخدمين</title>
<style>
body{
font-family:Tahoma;
margin:0;
background:#f2f5fa;
}
.header{
background:#0b1f3a;
color:white;
padding:18px;
text-align:center;
font-size:22px;
font-weight:bold;
}
.container{
padding:20px;
max-width:1200px;
margin:auto;
}
table{
width:100%;
border-collapse:collapse;
background:white;
box-shadow:0 6px 16px rgba(0,0,0,0.08);
border-radius:12px;
overflow:hidden;
}
th,td{
padding:10px;
border-bottom:1px solid #eee;
text-align:center;
font-size:13px;
}
th{
background:#f4f6fb;
}
button{
padding:7px 10px;
border:none;
border-radius:6px;
cursor:pointer;
font-size:12px;
margin:2px;
}
.add{background:#2ecc71;color:white;}
.remove{background:#f39c12;color:white;}
.ban{background:#c0392b;color:white;}
.freeze{background:#8e44ad;color:white;}
.delete{background:#111;color:white;}
.pass{background:#2980b9;color:white;}
.pkg{background:#16a085;color:white;}
.ok{color:#27ae60;font-weight:bold;}
.no{color:#c0392b;font-weight:bold;}
</style>
</head>
<body>

<div class="header">إدارة المستخدمين</div>

<div class="container">
<table>
<thead>
<tr>
<th>الاسم</th>
<th>البريد</th>
<th>الرصيد</th>
<th>الباقة</th>
<th>محظور</th>
<th>مجمد</th>
<th>التحكم</th>
</tr>
</thead>
<tbody id="usersTable"></tbody>
</table>
</div>

<script>
const API="https://sudancryptomarket.onrender.com";
const adminToken=localStorage.getItem("adminToken");

if(!adminToken){
window.location.href="login.html";
}

function loadUsers(){
fetch(API+"/admin-users",{
headers:{
"x-admin-token":adminToken
}
})
.then(res=>res.json())
.then(data=>{
if(!data.success){
alert(data.message||"فشل تحميل المستخدمين");
return;
}

let html="";
(data.users||[]).forEach(user=>{
html+=`
<tr>
<td>${user.name||"-"}</td>
<td>${user.email||"-"}</td>
<td>${user.balance||0} USDT</td>
<td>${user.packageName||"لا توجد"}</td>
<td class="${user.isBanned ? "no":"ok"}">${user.isBanned ? "نعم":"لا"}</td>
<td class="${user.isFrozen ? "no":"ok"}">${user.isFrozen ? "نعم":"لا"}</td>
<td>
<button class="add" onclick="addBalance('${user.email}')">إضافة رصيد</button>
<button class="remove" onclick="removeBalance('${user.email}')">خصم رصيد</button>
<button class="pass" onclick="changePassword('${user.email}')">تغيير كلمة السر</button>
<button class="pkg" onclick="setPackage('${user.email}')">تفعيل باقة</button>
<button class="ban" onclick="banUser('${user.email}',${user.isBanned})">${user.isBanned ? "فك الحظر":"حظر"}</button>
<button class="freeze" onclick="freezeUser('${user.email}',${user.isFrozen})">${user.isFrozen ? "فك التجميد":"تجميد"}</button>
<button class="delete" onclick="deleteUser('${user.email}')">حذف</button>
</td>
</tr>
`;
});
document.getElementById("usersTable").innerHTML=html || `<tr><td colspan="7">لا يوجد مستخدمون</td></tr>`;
});
}

function postAdmin(url,body){
return fetch(API+url,{
method:"POST",
headers:{
"Content-Type":"application/json",
"x-admin-token":adminToken
},
body:JSON.stringify(body)
}).then(res=>res.json());
}

function addBalance(email){
const amount=prompt("أدخل المبلغ");
if(!amount) return;
postAdmin("/admin-add-balance",{email,amount:Number(amount)}).then(data=>{
alert(data.success ? "تمت إضافة الرصيد" : (data.message||"فشلت العملية"));
loadUsers();
});
}

function removeBalance(email){
const amount=prompt("أدخل المبلغ");
if(!amount) return;
postAdmin("/admin-remove-balance",{email,amount:Number(amount)}).then(data=>{
alert(data.success ? "تم خصم الرصيد" : (data.message||"فشلت العملية"));
loadUsers();
});
}

function changePassword(email){
const newPassword=prompt("أدخل كلمة السر الجديدة");
if(!newPassword) return;
postAdmin("/admin-change-password",{email,newPassword}).then(data=>{
alert(data.success ? "تم تغيير كلمة السر" : (data.message||"فشلت العملية"));
loadUsers();
});
}

function setPackage(email){
const pack=prompt("اكتب اسم الباقة: starter أو silver أو gold أو diamond أو platinum");
if(!pack) return;
postAdmin("/admin-set-package",{email,package:pack}).then(data=>{
alert(data.success ? "تم تفعيل الباقة" : (data.message||"فشلت العملية"));
loadUsers();
});
}

function banUser(email,isBanned){
const url=isBanned ? "/admin-unban-user" : "/admin-ban-user";
postAdmin(url,{email}).then(data=>{
alert(data.success ? "تم تنفيذ العملية" : (data.message||"فشلت العملية"));
loadUsers();
});
}

function freezeUser(email,isFrozen){
const url=isFrozen ? "/admin-unfreeze-user" : "/admin-freeze-user";
postAdmin(url,{email}).then(data=>{
alert(data.success ? "تم تنفيذ العملية" : (data.message||"فشلت العملية"));
loadUsers();
});
}

function deleteUser(email){
if(!confirm("هل أنت متأكد من حذف الحساب؟")) return;
postAdmin("/admin-delete-user",{email}).then(data=>{
alert(data.success ? "تم حذف الحساب" : (data.message||"فشلت العملية"));
loadUsers();
});
}

loadUsers();
</script>

</body>
</html>
