<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إدارة المستخدمين</title>

<style>
body{
margin:0;
font-family:Tahoma;
background:#f2f5fa;
}

.header{
background:#0b1f3a;
color:white;
padding:18px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.container{
padding:20px;
max-width:1200px;
margin:auto;
}

.top-actions{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:14px;
gap:10px;
flex-wrap:wrap;
}

.refresh-btn{
background:#2D6AF6;
color:white;
border:none;
padding:10px 16px;
border-radius:8px;
cursor:pointer;
font-size:14px;
}

.status-box{
font-size:14px;
color:#555;
}

.table-wrap{
overflow-x:auto;
background:white;
box-shadow:0 6px 16px rgba(0,0,0,0.08);
border-radius:12px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
min-width:900px;
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
text-align:center;
font-size:13px;
}

th{
background:#f4f6fb;
}

button{
padding:7px 10px;
border:none;
border-radius:6px;
cursor:pointer;
font-size:12px;
margin:2px;
}

.add{background:#2ecc71;color:white;}
.remove{background:#f39c12;color:white;}
.ban{background:#c0392b;color:white;}
.freeze{background:#8e44ad;color:white;}
.delete{background:#111;color:white;}
.pass{background:#2980b9;color:white;}
.pkg{background:#16a085;color:white;}

.ok{
color:#27ae60;
font-weight:bold;
}

.no{
color:#c0392b;
font-weight:bold;
}

.empty{
text-align:center;
padding:25px;
color:#777;
font-size:14px;
}

.small{
font-size:12px;
color:#777;
}
</style>
</head>
<body>

<div class="header">إدارة المستخدمين</div>

<div class="container">

<div class="top-actions">
<button class="refresh-btn" onclick="loadUsers()">تحديث القائمة</button>
<div class="status-box" id="statusBox">جاري تحميل المستخدمين...</div>
</div>

<div class="table-wrap">
<table>
<thead>
<tr>
<th>الاسم</th>
<th>البريد</th>
<th>الهاتف</th>
<th>الرصيد</th>
<th>الباقة</th>
<th>محظور</th>
<th>مجمد</th>
<th>التحكم</th>
</tr>
</thead>
<tbody id="usersTable"></tbody>
</table>
</div>

</div>

<script>
const API = "https://sudancryptomarket-api.onrender.com";
const adminToken = localStorage.getItem("adminToken");

if(!adminToken){
window.location.href = "login.html";
}

function setStatus(text){
document.getElementById("statusBox").innerText = text;
}

async function loadUsers(){
setStatus("جاري تحميل المستخدمين...");
document.getElementById("usersTable").innerHTML = `<tr><td colspan="8" class="empty">جاري التحميل...</td></tr>`;

try{

const res = await fetch(API + "/admin-users",{
headers:{
"x-admin-token":adminToken
}
});

const data = await res.json();

if(!data.success){
setStatus("فشل تحميل المستخدمين");
alert(data.message || "فشل تحميل المستخدمين");
if((data.message || "").includes("غير مصرح")){
localStorage.removeItem("adminToken");
window.location.href = "login.html";
}
return;
}

let html = "";

(data.users || []).forEach(user=>{

html += `
<tr>
<td>${user.name || "-"}</td>
<td>${user.email || "-"}</td>
<td>${user.phone || "-"}</td>
<td>${Number(user.balance || 0)} USDT</td>
<td>
<div>${user.packageName || "لا توجد"}</div>
<div class="small">${user.dailyProfit ? "ربح يومي: " + user.dailyProfit : ""}</div>
</td>
<td class="${user.isBanned ? "no" : "ok"}">${user.isBanned ? "نعم" : "لا"}</td>
<td class="${user.isFrozen ? "no" : "ok"}">${user.isFrozen ? "نعم" : "لا"}</td>
<td>
<button class="add" onclick="addBalance('${user.email}')">إضافة رصيد</button>
<button class="remove" onclick="removeBalance('${user.email}')">خصم رصيد</button>
<button class="pass" onclick="changePassword('${user.email}')">تغيير كلمة السر</button>
<button class="pkg" onclick="setPackage('${user.email}')">تفعيل باقة</button>
<button class="ban" onclick="banUser('${user.email}', ${user.isBanned ? "true" : "false"})">${user.isBanned ? "فك الحظر" : "حظر"}</button>
<button class="freeze" onclick="freezeUser('${user.email}', ${user.isFrozen ? "true" : "false"})">${user.isFrozen ? "فك التجميد" : "تجميد"}</button>
<button class="delete" onclick="deleteUser('${user.email}')">حذف</button>
</td>
</tr>
`;

});

document.getElementById("usersTable").innerHTML = html || `<tr><td colspan="8" class="empty">لا يوجد مستخدمون</td></tr>`;
setStatus("تم تحميل " + ((data.users || []).length) + " مستخدم");

}catch(err){
document.getElementById("usersTable").innerHTML = `<tr><td colspan="8" class="empty">تعذر تحميل البيانات</td></tr>`;
setStatus("تعذر الاتصال بالسيرفر");
}
}

function postAdmin(url, body){
return fetch(API + url,{
method:"POST",
headers:{
"Content-Type":"application/json",
"x-admin-token":adminToken
},
body:JSON.stringify(body)
}).then(res=>res.json());
}

function addBalance(email){
const amount = prompt("أدخل مبلغ الإضافة");
if(amount === null) return;

const value = Number(amount);
if(!value || value <= 0){
alert("أدخل مبلغ صحيح");
return;
}

postAdmin("/admin-add-balance",{email,amount:value}).then(data=>{
alert(data.success ? "تمت إضافة الرصيد" : (data.message || "فشلت العملية"));
loadUsers();
}).catch(()=>{
alert("تعذر الاتصال بالسيرفر");
});
}

function removeBalance(email){
const amount = prompt("أدخل مبلغ الخصم");
if(amount === null) return;

const value = Number(amount);
if(!value || value <= 0){
alert("أدخل مبلغ صحيح");
return;
}

postAdmin("/admin-remove-balance",{email,amount:value}).then(data=>{
alert(data.success ? "تم خصم الرصيد" : (data.message || "فشلت العملية"));
loadUsers();
}).catch(()=>{
alert("تعذر الاتصال بالسيرفر");
});
}

function changePassword(email){
const newPassword = prompt("أدخل كلمة السر الجديدة");
if(newPassword === null) return;

if(!newPassword || newPassword.length < 4){
alert("أدخل كلمة سر صحيحة");
return;
}

postAdmin("/admin-change-password",{email,newPassword}).then(data=>{
alert(data.success ? "تم تغيير كلمة السر" : (data.message || "فشلت العملية"));
loadUsers();
}).catch(()=>{
alert("تعذر الاتصال بالسيرفر");
});
}

function setPackage(email){
const pack = prompt("اكتب اسم الباقة:\nstarter\nsilver\ngold\ndiamond\nplatinum");
if(pack === null) return;

const value = String(pack).trim().toLowerCase();
if(!value){
alert("أدخل اسم الباقة");
return;
}

postAdmin("/admin-set-package",{email,package:value}).then(data=>{
alert(data.success ? "تم تفعيل الباقة" : (data.message || "فشلت العملية"));
loadUsers();
}).catch(()=>{
alert("تعذر الاتصال بالسيرفر");
});
}

function banUser(email,isBanned){
const url = isBanned ? "/admin-unban-user" : "/admin-ban-user";

postAdmin(url,{email}).then(data=>{
alert(data.success ? "تم تنفيذ العملية" : (data.message || "فشلت العملية"));
loadUsers();
}).catch(()=>{
alert("تعذر الاتصال بالسيرفر");
});
}

function freezeUser(email,isFrozen){
const url = isFrozen ? "/admin-unfreeze-user" : "/admin-freeze-user";

postAdmin(url,{email}).then(data=>{
alert(data.success ? "تم تنفيذ العملية" : (data.message || "فشلت العملية"));
loadUsers();
}).catch(()=>{
alert("تعذر الاتصال بالسيرفر");
});
}

function deleteUser(email){
if(!confirm("هل أنت متأكد من حذف الحساب؟")) return;

postAdmin("/admin-delete-user",{email}).then(data=>{
alert(data.success ? "تم حذف الحساب" : (data.message || "فشلت العملية"));
loadUsers();
}).catch(()=>{
alert("تعذر الاتصال بالسيرفر");
});
}

loadUsers();
</script>

</body>
</html>
