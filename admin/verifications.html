<script>
const API="https://sudancryptomarket-api.onrender.com";
const adminToken=localStorage.getItem("adminToken");

if(!adminToken){
window.location.href="login.html";
}

function getStatusClass(status){
if(status==="approved") return "approved";
if(status==="rejected") return "rejected";
return "pending";
}

function getStatusText(status){
if(status==="approved") return "تمت الموافقة";
if(status==="rejected") return "مرفوض";
return "قيد المراجعة";
}

async function loadVerifications(){

document.getElementById("verificationTable").innerHTML="<tr><td colspan='8'>جاري التحميل...</td></tr>";
document.getElementById("countBox").innerText="جاري التحميل...";

try{

const res = await fetch(API + "/admin-verifications",{
headers:{
"x-admin-token":adminToken
}
});

const data = await res.json();

if(!data.success){
document.getElementById("verificationTable").innerHTML="<tr><td colspan='8'>فشل تحميل الطلبات</td></tr>";
return;
}

const list = data.verifications || [];

document.getElementById("countBox").innerText="عدد الطلبات: " + list.length;

let html="";

list.forEach(item=>{

html += `
<tr>

<td>${item.fullName || "-"}</td>

<td>${item.email || "-"}</td>

<td>${item.docType || "-"}</td>

<td>${item.docNumber || "-"}</td>

<td>
${item.fileUrl ? `<img src="${API}${item.fileUrl}" width="80" style="border-radius:6px;cursor:pointer" onclick="window.open('${API}${item.fileUrl}')">` : "-"}
</td>

<td>${item.note || "-"}</td>

<td class="${getStatusClass(item.status)}">${getStatusText(item.status)}</td>

<td>
<button class="approve" onclick="approveVerification('${item.email}')">قبول</button>
<button class="reject" onclick="rejectVerification('${item.email}')">رفض</button>
</td>

</tr>
`;

});

document.getElementById("verificationTable").innerHTML =
html || "<tr><td colspan='8'>لا توجد طلبات</td></tr>";

}catch(err){

console.log(err);

document.getElementById("verificationTable").innerHTML="<tr><td colspan='8'>تعذر الاتصال بالسيرفر</td></tr>";
document.getElementById("countBox").innerText="تعذر التحميل";

}

}

function postAdmin(url,body){

return fetch(API+url,{
method:"POST",
headers:{
"Content-Type":"application/json",
"x-admin-token":adminToken
},
body:JSON.stringify(body)
}).then(res=>res.json());

}

function approveVerification(email){

postAdmin("/admin-approve-verification",{email}).then(data=>{
alert(data.success ? "تمت الموافقة" : "فشل العملية");
loadVerifications();
});

}

function rejectVerification(email){

postAdmin("/admin-reject-verification",{email}).then(data=>{
alert(data.success ? "تم الرفض" : "فشل العملية");
loadVerifications();
});

}

loadVerifications();
  </script>
