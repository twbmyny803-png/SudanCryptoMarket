<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>طلبات الإيداع</title>

<style>
body{
font-family:Tahoma;
margin:0;
background:#f2f5fa;
}

.header{
background:#0b1f3a;
color:white;
padding:18px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.container{
padding:20px;
max-width:1100px;
margin:auto;
}

table{
width:100%;
border-collapse:collapse;
background:white;
box-shadow:0 6px 16px rgba(0,0,0,0.08);
border-radius:12px;
overflow:hidden;
}

th,td{
padding:12px;
border-bottom:1px solid #eee;
text-align:center;
font-size:13px;
}

th{
background:#f4f6fb;
}

button{
padding:8px 12px;
border:none;
border-radius:6px;
cursor:pointer;
font-size:12px;
margin:2px;
}

.approve{
background:#27ae60;
color:white;
}

.reject{
background:#c0392b;
color:white;
}

.refresh{
background:#2D6AF6;
color:white;
margin-bottom:15px;
padding:10px 16px;
border-radius:8px;
}

.empty{
padding:25px;
color:#777;
}
</style>
</head>

<body>

<div class="header">طلبات الإيداع</div>

<div class="container">

<button class="refresh" onclick="loadDeposits()">تحديث</button>

<table>

<thead>
<tr>
<th>المستخدم</th>
<th>البريد</th>
<th>المبلغ</th>
<th>العملة</th>
<th>الحالة</th>
<th>التحكم</th>
</tr>
</thead>

<tbody id="depositTable"></tbody>

</table>

</div>

<script>

const API="https://sudancryptomarket-api.onrender.com";
const adminToken=localStorage.getItem("adminToken");

if(!adminToken){
window.location.href="login.html";
}

async function loadDeposits(){

document.getElementById("depositTable").innerHTML="<tr><td colspan='6'>جاري التحميل...</td></tr>";

try{

const res=await fetch(API+"/admin-deposits",{
headers:{
"x-admin-token":adminToken
}
});

const data=await res.json();

if(!data.success){
alert(data.message||"فشل تحميل الطلبات");
return;
}

let html="";

(data.deposits||[]).forEach(dep=>{

html+=`
<tr>

<td>${dep.name||"-"}</td>

<td>${dep.email||"-"}</td>

<td>${dep.amount||0}</td>

<td>${dep.currency||"USDT"}</td>

<td>${dep.status||"pending"}</td>

<td>

<button class="approve" onclick="approveDeposit('${dep.id}')">قبول</button>

<button class="reject" onclick="rejectDeposit('${dep.id}')">رفض</button>

</td>

</tr>
`;

});

document.getElementById("depositTable").innerHTML=
html || "<tr><td colspan='6' class='empty'>لا توجد طلبات</td></tr>";

}catch(err){

document.getElementById("depositTable").innerHTML="<tr><td colspan='6'>تعذر الاتصال بالسيرفر</td></tr>";

}

}


function postAdmin(url,body){

return fetch(API+url,{
method:"POST",
headers:{
"Content-Type":"application/json",
"x-admin-token":adminToken
},
body:JSON.stringify(body)
}).then(res=>res.json());

}


function approveDeposit(id){

postAdmin("/admin-approve-deposit",{id}).then(data=>{

alert(data.success ? "تم قبول الإيداع" : (data.message||"فشلت العملية"));

loadDeposits();

});

}


function rejectDeposit(id){

postAdmin("/admin-reject-deposit",{id}).then(data=>{

alert(data.success ? "تم رفض الإيداع" : (data.message||"فشلت العملية"));

loadDeposits();

});

}

loadDeposits();

</script>

</body>
</html>
