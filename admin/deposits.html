<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>طلبات الإيداع | سودان كربتو</title>

<style>
body{
font-family:Tahoma;
margin:0;
background:#f2f5fa;
}

.header{
background:#0b1f3a;
color:white;
padding:18px;
text-align:center;
font-size:22px;
font-weight:bold;
position:relative;
}

.back-btn {
  position: absolute;
  right: 18px;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(255,255,255,0.2);
  color: white;
  border: none;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  text-decoration: none;
}

.back-btn:hover {
  background: rgba(255,255,255,0.3);
}

.container{
padding:20px;
max-width:1200px;
margin:auto;
}

table{
width:100%;
border-collapse:collapse;
background:white;
box-shadow:0 6px 16px rgba(0,0,0,0.08);
border-radius:12px;
overflow:hidden;
}

th,td{
padding:12px;
border-bottom:1px solid #eee;
text-align:center;
font-size:13px;
}

th{
background:#f4f6fb;
}

button{
padding:8px 12px;
border:none;
border-radius:6px;
cursor:pointer;
font-size:12px;
margin:2px;
}

.approve{
background:#27ae60;
color:white;
}

.approve:hover{
background:#219a52;
}

.reject{
background:#c0392b;
color:white;
}

.reject:hover{
background:#a53225;
}

.refresh{
background:#2D6AF6;
color:white;
margin-bottom:15px;
padding:10px 16px;
border-radius:8px;
cursor:pointer;
border:none;
}

.empty{
padding:25px;
color:#777;
text-align:center;
}

img{
border-radius:6px;
max-width:60px;
max-height:60px;
}

.status-badge{
display:inline-block;
padding:4px 10px;
border-radius:20px;
font-size:11px;
font-weight:bold;
}

.status-pending{
background:#fff3cd;
color:#856404;
}

.status-approved{
background:#d4edda;
color:#155724;
}

.status-rejected{
background:#f8d7da;
color:#721c24;
}

.status-cancelled{
background:#e2e3e5;
color:#383d41;
}

.txid-link{
color:#2D6AF6;
text-decoration:none;
font-size:11px;
word-break:break-all;
}

.txid-link:hover{
text-decoration:underline;
}

.actions{
display:flex;
gap:5px;
justify-content:center;
flex-wrap:wrap;
}

@media (max-width: 768px) {
  th, td {
    padding: 8px;
    font-size: 11px;
  }
  button {
    padding: 6px 10px;
    font-size: 10px;
  }
}
</style>
</head>

<body>

<div class="header">
<a href="dashboard.html" class="back-btn">←</a>
طلبات الإيداع
</div>

<div class="container">

<div style="margin-bottom:15px; display:flex; gap:10px;">
<button class="refresh" onclick="loadDeposits()">🔄 تحديث</button>
</div>

<table>
<thead>
<tr>
<th>المستخدم</th>
<th>البريد</th>
<th>المبلغ</th>
<th>TXID / رابط التحقق</th>
<th>الصورة</th>
<th>الحالة</th>
<th>التحكم</th>
</tr>
</thead>
<tbody id="depositTable"></tbody>
</table>

</div>

<script>

const API = "https://sudancryptomarket-api.onrender.com";
const adminToken = localStorage.getItem("adminToken");

if(!adminToken){
  window.location.href = "login.html";
}

// دالة لإنشاء رابط التحقق من TXID حسب الشبكة
function getTxidLink(network, txid) {
  if(!txid || txid === "-") return "-";
  
  if(network && network.includes("TRC20")) {
    return `<a href="https://tronscan.org/#/transaction/${txid}" target="_blank" class="txid-link">🔍 ${txid.substring(0,12)}...</a>`;
  }
  if(network && network.includes("BEP20")) {
    return `<a href="https://bscscan.com/tx/${txid}" target="_blank" class="txid-link">🔍 ${txid.substring(0,12)}...</a>`;
  }
  return `<span class="txid-link">${txid.substring(0,15)}...</span>`;
}

async function loadDeposits() {
  document.getElementById("depositTable").innerHTML = '<tr><td colspan="7" class="empty">⏳ جاري التحميل...</td></tr>';
  
  try {
    const res = await fetch(API + "/admin-deposits", {
      headers: { "x-admin-token": adminToken }
    });
    
    const data = await res.json();
    
    if(!data.success) {
      alert(data.message || "فشل تحميل الطلبات");
      document.getElementById("depositTable").innerHTML = '<tr><td colspan="7" class="empty">❌ فشل تحميل الطلبات</td></tr>';
      return;
    }
    
    let html = "";
    const deposits = data.deposits || [];
    
    if(deposits.length === 0) {
      html = '<tr><td colspan="7" class="empty">📭 لا توجد طلبات إيداع</td></tr>';
    } else {
      deposits.forEach(dep => {
        let statusClass = "";
        let statusText = dep.status || "pending";
        
        if(statusText === "pending") statusClass = "status-pending";
        else if(statusText === "approved") statusClass = "status-approved";
        else if(statusText === "rejected") statusClass = "status-rejected";
        else if(statusText === "cancelled") statusClass = "status-cancelled";
        
        const statusDisplay = `<span class="status-badge ${statusClass}">${statusText === "pending" ? "⏳ قيد المراجعة" : statusText === "approved" ? "✅ مقبول" : statusText === "rejected" ? "❌ مرفوض" : "⛔ ملغى"}</span>`;
        
        // رابط TXID للتحقق
        const txidDisplay = dep.txid && dep.txid !== "-" ? getTxidLink(dep.network, dep.txid) : "-";
        
        // عرض الصورة
        const proofDisplay = dep.proof ? `<img src="${API}${dep.proof}" alt="proof" title="إثبات الدفع" onclick="window.open('${API}${dep.proof}','_blank')" style="cursor:pointer;">` : "-";
        
        // ✅ استخدام orderId من السيرفر مباشرة
        const orderId = dep.orderId || "";
        
        // أزرار التحكم (تظهر فقط للمعلقة)
        let controls = "-";
        if(statusText === "pending" && orderId) {
          controls = `
            <div class="actions">
              <button class="approve" onclick="approveDeposit('${dep.email}', '${orderId}')">✅ قبول</button>
              <button class="reject" onclick="rejectDeposit('${dep.email}', '${orderId}')">❌ رفض</button>
            </div>
          `;
        } else if(statusText === "pending" && !orderId) {
          controls = `<span style="color:red;">⚠️ لا يوجد orderId</span>`;
        }
        
        html += `
          <tr>
            <td>${dep.name || "-"}</td>
            <td>${dep.email || "-"}</td>
            <td><strong>${dep.amount || 0} USDT</strong><br><small>${dep.network || "-"}</small></td>
            <td>${txidDisplay}</td>
            <td>${proofDisplay}</td>
            <td>${statusDisplay}</td>
            <td>${controls}</td>
          </tr>
        `;
      });
    }
    
    document.getElementById("depositTable").innerHTML = html;
    
  } catch(err) {
    console.error(err);
    document.getElementById("depositTable").innerHTML = '<tr><td colspan="7" class="empty">⚠️ تعذر الاتصال بالسيرفر</td></tr>';
  }
}

function postAdmin(url, body) {
  return fetch(API + url, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-admin-token": adminToken
    },
    body: JSON.stringify(body)
  }).then(res => res.json());
}

function approveDeposit(email, orderId) {
  console.log("📤 إرسال قبول:", { email, orderId });
  if(confirm("✅ هل أنت متأكد من قبول هذا الإيداع؟")) {
    postAdmin("/admin-approve-deposit", { email, orderId }).then(data => {
      console.log("📥 الرد:", data);
      if(data.success) {
        alert("✅ تم قبول الإيداع بنجاح");
        loadDeposits();
      } else {
        alert("❌ " + (data.message || "فشلت العملية"));
      }
    }).catch((err) => {
      console.error("❌ خطأ:", err);
      alert("❌ خطأ في الاتصال بالخادم");
    });
  }
}

function rejectDeposit(email, orderId) {
  console.log("📤 إرسال رفض:", { email, orderId });
  if(confirm("❌ هل أنت متأكد من رفض هذا الإيداع؟")) {
    postAdmin("/admin-reject-deposit", { email, orderId }).then(data => {
      console.log("📥 الرد:", data);
      if(data.success) {
        alert("✅ تم رفض الإيداع بنجاح");
        loadDeposits();
      } else {
        alert("❌ " + (data.message || "فشلت العملية"));
      }
    }).catch((err) => {
      console.error("❌ خطأ:", err);
      alert("❌ خطأ في الاتصال بالخادم");
    });
  }
}

// تحميل الطلبات عند فتح الصفحة
loadDeposits();

// تحديث تلقائي كل 30 ثانية
setInterval(() => {
  loadDeposits();
}, 30000);

</script>

</body>
</html>
