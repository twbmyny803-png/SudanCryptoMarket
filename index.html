<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sudan Crypto</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f4f6fb;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:40px;
border-radius:12px;
width:340px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
text-align:center;
}

h2{
color:#1A1A1A;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border:1px solid #ddd;
border-radius:6px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:6px;
background:#2D6AF6;
color:white;
font-size:16px;
margin-top:10px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

.links{
margin-top:15px;
font-size:14px;
}

.links a{
color:#2D6AF6;
text-decoration:none;
display:block;
margin-top:6px;
}

footer{
position:absolute;
bottom:10px;
font-size:13px;
color:#666;
}

</style>
</head>

<body>

<div class="container">

<h2>Create Account</h2>

<input type="text" placeholder="Full Name">

<input type="email" placeholder="Email Address">

<input type="text" value="Sudan 🇸🇩 (+249)" readonly>

<input type="text" placeholder="Referral Code (Optional)">

<button>Verify Email</button>

<button>Create Account</button>

<div class="links">
<a href="#">Login</a>
<a href="#">Forgot Password</a>
</div>

</div>

<footer>
© Sudan Crypto – All rights reserved
</footer>

</body>
</html>
