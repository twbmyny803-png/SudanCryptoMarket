<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sudan Crypto</title>

<style>

body{
font-family: Tahoma, Arial;
background: linear-gradient(135deg,#eef2ff,#f8fafc);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:40px;
border-radius:16px;
width:360px;
box-shadow:0 15px 40px rgba(0,0,0,0.1);
text-align:center;
}

h2{
color:#1A1A1A;
margin-bottom:25px;
}

input{
width:100%;
padding:14px;
margin:10px 0;
border:1px solid #ddd;
border-radius:8px;
font-size:14px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:8px;
font-size:16px;
margin-top:10px;
cursor:pointer;
transition:0.3s;
}

.verify{
background:#2D6AF6;
color:white;
}

.verify:hover{
background:#1f54d8;
}

.create{
background:#10B981;
color:white;
}

.create:hover{
background:#0f9f6e;
}

.links{
margin-top:15px;
}

.links a{
display:block;
margin-top:8px;
text-decoration:none;
color:#2D6AF6;
font-size:14px;
}

footer{
position:absolute;
bottom:15px;
font-size:13px;
color:#777;
}

.logo{
font-weight:bold;
color:#2D6AF6;
margin-bottom:10px;
font-size:20px;
}

</style>
</head>


<body>

<div class="container">

<div class="logo">Sudan Crypto</div>

<h2>إنشاء حساب</h2>

<input type="text" placeholder="الاسم الكامل">

<input type="email" placeholder="البريد الإلكتروني">

<input type="text" value="السودان 🇸🇩 (+249)" readonly>

<input type="text" placeholder="رمز الإحالة (اختياري)">

<button class="verify">تحقق من البريد</button>

<button class="create">إنشاء الحساب</button>

<div class="links">

<a href="#">تسجيل الدخول</a>

<a href="#">نسيت كلمة المرور</a>

</div>

</div>

<footer>
© سودان كربتو – جميع الحقوق محفوظة
</footer>

</body>
</html>
