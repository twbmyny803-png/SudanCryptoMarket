<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سودان كربتو</title>

<style>

body{
margin:0;
font-family:Tahoma,Arial;
background:linear-gradient(135deg,#07162b,#0b1f3a,#12345c);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:95%;
max-width:380px;
background:#dcebff;
border-radius:18px;
padding:25px;
box-shadow:0 15px 40px rgba(0,0,0,0.3);
}

.logo{
text-align:center;
font-size:22px;
font-weight:bold;
color:#2D6AF6;
margin-bottom:5px;
}

.subtitle{
text-align:center;
font-size:12px;
color:#555;
margin-bottom:15px;
}

h2{
text-align:center;
margin-bottom:10px;
}

label{
font-weight:bold;
font-size:13px;
}

input{
width:100%;
height:42px;
border-radius:8px;
border:1px solid #ccc;
padding:8px;
margin-top:5px;
margin-bottom:10px;
font-size:13px;
}

.verify-btn{
width:100%;
height:45px;
border:none;
border-radius:8px;
background:#2D6AF6;
color:white;
font-size:14px;
font-weight:bold;
cursor:pointer;
}

.create-btn{
width:100%;
height:45px;
border:none;
border-radius:8px;
background:#10B981;
color:white;
font-size:14px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
opacity:0.5;
}

.code-section{
display:none;
text-align:center;
}

.code-box{
display:flex;
justify-content:center;
gap:8px;
margin:15px 0;
}

.code-box input{
width:38px;
height:45px;
text-align:center;
font-size:20px;
}

.timer{
font-size:13px;
color:#444;
}

.resend{
color:#2D6AF6;
margin-top:8px;
display:none;
cursor:pointer;
}

.links{
text-align:center;
margin-top:10px;
}

.links a{
display:block;
color:#2D6AF6;
text-decoration:none;
margin-top:5px;
}

footer{
text-align:center;
margin-top:15px;
font-size:11px;
color:#333;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">سودان كربتو</div>
<div class="subtitle">منصة العملات الرقمية في السودان</div>

<h2>إنشاء حساب</h2>

<label>الاسم الحقيقي</label>
<input type="text" placeholder="اكتب الاسم الحقيقي">

<label>البريد الإلكتروني</label>
<input type="email" id="email" placeholder="اكتب البريد الإلكتروني">

<button class="verify-btn" onclick="sendCode()">تحقق من البريد الإلكتروني</button>

<div class="code-section" id="codeSection">

<p>أدخل كود التحقق</p>

<div class="code-box">
<input maxlength="1">
<input maxlength="1">
<input maxlength="1">
<input maxlength="1">
<input maxlength="1">
<input maxlength="1">
</div>

<div class="timer">
إعادة إرسال الكود خلال <span id="count">60</span> ثانية
</div>

<div class="resend" id="resend" onclick="sendCode()">
إرسال كود جديد
</div>

</div>

<label>الدولة</label>
<input type="text" value="السودان 🇸🇩 (+249)" readonly>

<label>رقم الهاتف</label>
<input type="tel" placeholder="مثال: 912345678">

<label>رمز الإحالة (اختياري)</label>
<input type="text" placeholder="رمز الإحالة">

<label>كلمة المرور</label>
<input type="password" placeholder="كلمة المرور">

<label>تأكيد كلمة المرور</label>
<input type="password" placeholder="تأكيد كلمة المرور">

<button class="create-btn" id="createBtn">
إنشاء الحساب
</button>

<div class="links">

<a href="login.html">تسجيل الدخول</a>

<a href="forgot.html">نسيت كلمة المرور؟</a>

</div>

<footer>
© سودان كربتو – جميع الحقوق محفوظة
</footer>

</div>

<script>

function sendCode(){

let email=document.getElementById("email").value

if(email===""){
alert("اكتب البريد الإلكتروني أولاً")
return
}

document.getElementById("codeSection").style.display="block"

startTimer()

}

function startTimer(){

let time=60

let count=document.getElementById("count")

let resend=document.getElementById("resend")

resend.style.display="none"

let timer=setInterval(()=>{

time--

count.innerText=time

if(time<=0){

clearInterval(timer)

count.innerText="0"

resend.style.display="block"

}

},1000)

}

let inputs=document.querySelectorAll(".code-box input")

inputs.forEach((input,index)=>{

input.addEventListener("input",()=>{

if(input.value.length==1 && index<5){

inputs[index+1].focus()

}

})

})

</script>

</body>
</html>
