<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>سودان كربتو | إنشاء حساب</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Tahoma', sans-serif;
  background: linear-gradient(135deg, #0b1f3a 0%, #1a2f4e 100%);
  min-height: 100vh;
  padding: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.container {
  max-width: 480px;
  width: 100%;
  margin: 0 auto;
  background: white;
  border-radius: 32px;
  padding: 28px 20px;
  box-shadow: 0 20px 35px rgba(0,0,0,0.2);
}

.logo {
  text-align: center;
  font-size: 28px;
  font-weight: 800;
  color: #2D6AF6;
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.logo i {
  font-size: 28px;
}

.subtitle {
  text-align: center;
  color: #64748b;
  font-size: 13px;
  margin-bottom: 24px;
  border-bottom: 1px solid #e2e8f0;
  padding-bottom: 12px;
}

h2 {
  font-size: 20px;
  font-weight: 700;
  color: #0f172a;
  text-align: center;
  margin-bottom: 20px;
}

label {
  display: block;
  margin-top: 12px;
  margin-bottom: 6px;
  font-size: 13px;
  font-weight: 600;
  color: #1e293b;
}

label i {
  margin-left: 6px;
  color: #2D6AF6;
  width: 18px;
}

input, select {
  width: 100%;
  height: 48px;
  border: 1px solid #e2e8f0;
  border-radius: 16px;
  padding: 0 14px;
  font-size: 14px;
  background: #f8fafc;
  transition: all 0.2s;
  outline: none;
}

input:focus, select:focus {
  border-color: #2D6AF6;
  box-shadow: 0 0 0 3px rgba(45,106,246,0.1);
  background: white;
}

input[readonly] {
  background: #f1f5f9;
  color: #475569;
  cursor: not-allowed;
}

.password-wrap {
  position: relative;
  width: 100%;
}

.password-wrap input {
  padding-left: 70px;
}

.toggle-password {
  position: absolute;
  left: 8px;
  top: 50%;
  transform: translateY(-50%);
  background: #2D6AF6;
  color: white;
  border: none;
  border-radius: 40px;
  padding: 6px 14px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}

.toggle-password:hover {
  background: #1e4fcf;
}

.password-note {
  font-size: 11px;
  color: #64748b;
  margin-top: 6px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.btn {
  width: 100%;
  height: 50px;
  border: none;
  border-radius: 40px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  margin-top: 16px;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.btn-primary {
  background: linear-gradient(135deg, #2D6AF6, #1e4fcf);
  color: white;
  box-shadow: 0 4px 12px rgba(45,106,246,0.3);
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 18px rgba(45,106,246,0.4);
}

.btn-success {
  background: linear-gradient(135deg, #10b981, #059669);
  color: white;
  box-shadow: 0 4px 12px rgba(16,185,129,0.3);
}

.btn-success:hover {
  transform: translateY(-2px);
}

.code-section {
  background: #f8fafc;
  border-radius: 20px;
  padding: 16px;
  margin-top: 16px;
  border: 1px solid #e2e8f0;
}

.code-title {
  font-weight: 700;
  font-size: 14px;
  text-align: center;
  margin-bottom: 12px;
  color: #1e293b;
}

.code-box {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin: 12px 0;
  direction: ltr;
}

.code-box input {
  width: 48px;
  height: 52px;
  text-align: center;
  font-size: 22px;
  font-weight: 700;
  border-radius: 16px;
  background: white;
  border: 2px solid #e2e8f0;
  padding: 0;
}

.code-box input:focus {
  border-color: #2D6AF6;
  box-shadow: 0 0 0 2px rgba(45,106,246,0.2);
}

.timer {
  font-size: 13px;
  text-align: center;
  color: #475569;
  margin-top: 8px;
}

.resend {
  text-align: center;
  color: #2D6AF6;
  margin-top: 12px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  display: none;
}

.resend:hover {
  text-decoration: underline;
}

.status-message {
  margin-top: 12px;
  font-size: 13px;
  font-weight: 500;
  text-align: center;
  padding: 8px;
  border-radius: 40px;
  display: none;
}

.status-success {
  background: #dcfce7;
  color: #166534;
}

.status-error {
  background: #fee2e2;
  color: #991b1b;
}

.links {
  text-align: center;
  margin-top: 20px;
}

.links a {
  text-decoration: none;
  color: #2D6AF6;
  font-weight: 600;
  font-size: 13px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.links a:hover {
  text-decoration: underline;
}

footer {
  text-align: center;
  margin-top: 20px;
  font-size: 11px;
  color: #94a3b8;
}

/* responsive */
@media (max-width: 450px) {
  .container {
    padding: 20px 16px;
  }
  .code-box input {
    width: 40px;
    height: 48px;
    font-size: 20px;
  }
}
</style>
</head>

<body>

<div class="container">
  <div class="logo">
    <i class="fa-brands fa-bitcoin"></i> سودان كربتو
  </div>
  <div class="subtitle">منصة العملات الرقمية في السودان</div>

  <h2>إنشاء حساب</h2>

  <label><i class="fa-regular fa-user"></i> الاسم الحقيقي</label>
  <input type="text" id="fullName" placeholder="اكتب الاسم الحقيقي">

  <label><i class="fa-regular fa-envelope"></i> البريد الإلكتروني</label>
  <input type="email" id="email" placeholder="اكتب البريد الإلكتروني">

  <button class="btn btn-primary" onclick="sendCode()">
    <i class="fa-regular fa-paper-plane"></i> تحقق من البريد الإلكتروني
  </button>
  <div class="status-message status-success" id="sendSuccess"></div>
  <div class="status-message status-error" id="sendError"></div>

  <div class="code-section" id="codeSection">
    <p class="code-title"><i class="fa-solid fa-key"></i> أدخل كود التحقق</p>

    <div class="code-box">
      <input type="text" maxlength="1" inputmode="numeric">
      <input type="text" maxlength="1" inputmode="numeric">
      <input type="text" maxlength="1" inputmode="numeric">
      <input type="text" maxlength="1" inputmode="numeric">
      <input type="text" maxlength="1" inputmode="numeric">
      <input type="text" maxlength="1" inputmode="numeric">
    </div>

    <div class="timer">
      <i class="fa-regular fa-clock"></i> إعادة إرسال الكود خلال <span id="count">60</span> ثانية
    </div>

    <div class="resend" id="resend" onclick="sendCode()">
      <i class="fa-solid fa-rotate-right"></i> إرسال كود جديد
    </div>

    <div class="status-message status-error" id="verifyError"></div>
  </div>

  <label><i class="fa-solid fa-location-dot"></i> الدولة</label>
  <input type="text" value="السودان 🇸🇩 (+249)" readonly>

  <label><i class="fa-solid fa-phone"></i> رقم الهاتف</label>
  <input type="tel" id="phone" placeholder="مثال: 912345678">

  <label><i class="fa-solid fa-gift"></i> رمز الإحالة (اختياري)</label>
  <input type="text" id="referralCode" placeholder="رمز الإحالة">

  <label><i class="fa-solid fa-lock"></i> كلمة المرور</label>
  <div class="password-wrap">
    <input type="password" id="password" placeholder="كلمة المرور">
    <button type="button" class="toggle-password" onclick="togglePassword('password', this)">إظهار</button>
  </div>

  <div class="password-note">
    <i class="fa-regular fa-circle-check"></i> يجب أن تتكون كلمة المرور من 8 أحرف أو أرقام على الأقل
  </div>

  <label><i class="fa-solid fa-lock"></i> تأكيد كلمة المرور</label>
  <div class="password-wrap">
    <input type="password" id="confirmPassword" placeholder="تأكيد كلمة المرور">
    <button type="button" class="toggle-password" onclick="togglePassword('confirmPassword', this)">إظهار</button>
  </div>

  <button class="btn btn-success" id="createBtn" onclick="createAccount()">
    <i class="fa-regular fa-user-plus"></i> إنشاء الحساب
  </button>

  <div class="status-message status-success" id="registerSuccess"></div>
  <div class="status-message status-error" id="registerError"></div>

  <div class="links">
    <a href="login.html"><i class="fa-solid fa-arrow-left"></i> تسجيل الدخول</a>
  </div>

  <footer>© سودان كربتو – جميع الحقوق محفوظة</footer>
</div>

<script>
// ✅ تم تغيير الرابط إلى الخدمة الجديدة
const API_BASE = "https://sudancryptomarket-1.onrender.com";

const urlParams = new URLSearchParams(window.location.search);
const refCodeFromLink = urlParams.get("ref");

if(refCodeFromLink){
  document.getElementById("referralCode").value = refCodeFromLink;
}

let timerInterval = null;

function togglePassword(inputId, button){
  const input = document.getElementById(inputId);

  if(input.type === "password"){
    input.type = "text";
    button.textContent = "إخفاء";
  } else {
    input.type = "password";
    button.textContent = "إظهار";
  }
}

function isValidEmail(email){
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

function showBox(id, message){
  const box = document.getElementById(id);
  box.textContent = message;
  box.style.display = "block";
}

function hideBox(id){
  document.getElementById(id).style.display = "none";
}

function resetSendMessages(){
  hideBox("sendSuccess");
  hideBox("sendError");
}

function resetVerifyMessages(){
  hideBox("verifyError");
}

function resetRegisterMessages(){
  hideBox("registerSuccess");
  hideBox("registerError");
}

function showRegisterError(message){
  hideBox("registerSuccess");
  showBox("registerError", message);
}

function showRegisterSuccess(message){
  hideBox("registerError");
  showBox("registerSuccess", message);
}

function clearCodeInputs(){
  document.querySelectorAll(".code-box input").forEach(input => {
    input.value = "";
  });
}

function sendCode(){
  const email = document.getElementById("email").value.trim();

  resetSendMessages();
  resetVerifyMessages();
  resetRegisterMessages();

  if(email === ""){
    showBox("sendError", "اكتب البريد الإلكتروني أولاً");
    return;
  }

  if(!isValidEmail(email)){
    showBox("sendError", "أدخل بريدًا إلكترونيًا صحيحًا");
    return;
  }

  fetch(`${API_BASE}/send-code`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ email })
  })
  .then(async (res) => {
    const data = await res.json();

    if(!res.ok || data.success === false){
      throw new Error(data.message || "فشل إرسال الكود");
    }

    clearCodeInputs();
    showBox("sendSuccess", "تم إرسال كود التحقق إلى بريدك الإلكتروني");
    startTimer();
    document.querySelector(".code-box input").focus();
  })
  .catch((err) => {
    showBox("sendError", err.message || "حدث خطأ أثناء إرسال الكود");
  });
}

function startTimer(){
  let time = 60;
  const count = document.getElementById("count");
  const resend = document.getElementById("resend");

  resend.style.display = "none";
  count.innerText = time;

  if(timerInterval){
    clearInterval(timerInterval);
  }

  timerInterval = setInterval(() => {
    time--;
    count.innerText = time;

    if(time <= 0){
      clearInterval(timerInterval);
      timerInterval = null;
      count.innerText = "0";
      resend.style.display = "block";
    }
  }, 1000);
}

const inputs = document.querySelectorAll(".code-box input");

inputs.forEach((input, index) => {
  input.addEventListener("input", () => {
    input.value = input.value.replace(/[^0-9]/g, "");

    if(input.value.length === 1 && index < inputs.length - 1){
      inputs[index + 1].focus();
    }
  });

  input.addEventListener("keydown", (e) => {
    if(e.key === "Backspace" && input.value === "" && index > 0){
      inputs[index - 1].focus();
    }
  });
});

async function verifyCodeBeforeRegister(email){
  const code = Array.from(inputs).map(input => input.value).join("");

  if(code.length !== 6){
    showBox("verifyError", "اكتب كود التحقق كاملاً");
    return false;
  }

  try{
    const res = await fetch(`${API_BASE}/verify-code`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email, code })
    });

    const data = await res.json();

    if(!res.ok || data.success === false){
      throw new Error(data.message || "فشل التحقق من الكود");
    }

    hideBox("verifyError");
    return true;

  }catch(err){
    showBox("verifyError", err.message || "حدث خطأ أثناء التحقق من الكود");
    return false;
  }
}

async function createAccount(){
  const fullName = document.getElementById("fullName").value.trim();
  const email = document.getElementById("email").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const referralCode = document.getElementById("referralCode").value.trim();
  const password = document.getElementById("password").value.trim();
  const confirmPassword = document.getElementById("confirmPassword").value.trim();

  resetRegisterMessages();
  resetVerifyMessages();

  if(fullName === ""){
    showRegisterError("اكتب الاسم الحقيقي");
    return;
  }

  if(email === ""){
    showRegisterError("اكتب البريد الإلكتروني");
    return;
  }

  if(!isValidEmail(email)){
    showRegisterError("أدخل بريدًا إلكترونيًا صحيحًا");
    return;
  }

  if(phone === ""){
    showRegisterError("اكتب رقم الهاتف");
    return;
  }

  if(password === ""){
    showRegisterError("اكتب كلمة المرور");
    return;
  }

  if(password.length < 8){
    showRegisterError("كلمة المرور يجب أن تكون 8 أحرف أو أكثر");
    return;
  }

  if(confirmPassword === ""){
    showRegisterError("اكتب تأكيد كلمة المرور");
    return;
  }

  if(password !== confirmPassword){
    showRegisterError("كلمتا المرور غير متطابقتين");
    return;
  }

  const verified = await verifyCodeBeforeRegister(email);

  if(!verified){
    return;
  }

  fetch(`${API_BASE}/register`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      name: fullName,
      email: email,
      phone: phone,
      password: password,
      referrer: referralCode
    })
  })
  .then(async (res) => {
    const data = await res.json();

    if(!res.ok || data.success === false){
      throw new Error(data.message || "فشل إنشاء الحساب");
    }

    showRegisterSuccess("تم إنشاء الحساب بنجاح");
    setTimeout(() => {
      window.location.href = "login.html";
    }, 1200);
  })
  .catch((err) => {
    showRegisterError(err.message || "حدث خطأ أثناء إنشاء الحساب");
  });
}
</script>

</body>
</html>
