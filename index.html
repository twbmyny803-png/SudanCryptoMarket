<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سودان كربتو</title>

<style>

body{
margin:0;
font-family:Tahoma, Arial;
background:linear-gradient(135deg,#eef4ff,#f8fbff,#eefaf5);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:400px;
background:white;
padding:35px;
border-radius:18px;
box-shadow:0 20px 50px rgba(0,0,0,0.1);
}

.logo{
text-align:center;
font-size:24px;
font-weight:bold;
color:#2D6AF6;
margin-bottom:5px;
}

.subtitle{
text-align:center;
color:#777;
font-size:13px;
margin-bottom:20px;
}

h2{
text-align:center;
margin-bottom:20px;
color:#1A1A1A;
}

label{
font-size:14px;
font-weight:bold;
display:block;
margin-top:10px;
}

input{
width:100%;
padding:12px;
margin-top:6px;
border-radius:8px;
border:1px solid #ddd;
font-size:14px;
}

input:focus{
border-color:#2D6AF6;
outline:none;
}

button{
width:100%;
padding:13px;
margin-top:12px;
border:none;
border-radius:8px;
font-size:15px;
cursor:pointer;
}

.verify{
background:#2D6AF6;
color:white;
}

.create{
background:#10B981;
color:white;
}

.links{
text-align:center;
margin-top:15px;
}

.links a{
display:block;
color:#2D6AF6;
text-decoration:none;
margin-top:6px;
font-size:14px;
}

footer{
text-align:center;
margin-top:20px;
font-size:12px;
color:#777;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">سودان كربتو</div>
<div class="subtitle">منصة العملات الرقمية في السودان</div>

<h2>إنشاء حساب</h2>

<label>الاسم الحقيقي</label>
<input type="text" placeholder="اكتب الاسم الحقيقي">

<label>البريد الإلكتروني</label>
<input type="email" placeholder="اكتب البريد الإلكتروني">

<label>الدولة</label>
<input type="text" value="السودان 🇸🇩 (+249)" readonly>

<label>رقم الهاتف</label>
<input type="tel" placeholder="مثال: 912345678">

<label>رمز الإحالة (اختياري)</label>
<input type="text" placeholder="رمز الإحالة">

<label>كلمة المرور</label>
<input type="password" placeholder="كلمة المرور">

<label>تأكيد كلمة المرور</label>
<input type="password" placeholder="تأكيد كلمة المرور">

<button class="verify">تحقق من البريد الإلكتروني</button>
<button class="create">إنشاء الحساب</button>

<div class="links">

<a href="login.html">تسجيل الدخول</a>

<a href="forgot.html">نسيت كلمة المرور؟</a>

</div>

<footer>
© سودان كربتو – جميع الحقوق محفوظة
</footer>

</div>

</body>
</html>
