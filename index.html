<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سودان كربتو</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Tahoma, Arial, sans-serif;
  background:linear-gradient(135deg,#07162b,#0b1f3a,#12345c);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:12px;
}

.container{
  width:100%;
  max-width:380px;
  background:#dcebff;
  border-radius:18px;
  padding:22px 18px;
  box-shadow:0 18px 45px rgba(0,0,0,0.28);
  border:1px solid rgba(255,255,255,0.35);
}

.logo{
  text-align:center;
  font-size:22px;
  font-weight:700;
  color:#2D6AF6;
  margin-bottom:4px;
}

.subtitle{
  text-align:center;
  color:#42526b;
  font-size:12px;
  margin-bottom:14px;
}

h2{
  margin:0 0 14px;
  text-align:center;
  color:#1A1A1A;
  font-size:20px;
}

label{
  display:block;
  margin-top:8px;
  margin-bottom:4px;
  font-size:13px;
  font-weight:700;
  color:#1A1A1A;
}

input{
  width:100%;
  height:42px;
  border:1px solid #bfd0ea;
  border-radius:8px;
  padding:0 12px;
  font-size:13px;
  color:#1A1A1A;
  background:#f7fbff;
  outline:none;
}

input:focus{
  border-color:#2D6AF6;
  box-shadow:0 0 0 3px rgba(45,106,246,0.12);
  background:#ffffff;
}

input[readonly]{
  background:#edf4ff;
  color:#516076;
  cursor:not-allowed;
}

.password-note{
  font-size:11px;
  color:#4f5d73;
  margin-top:4px;
  line-height:1.6;
}

.password-wrap{
  position:relative;
  width:100%;
}

.password-wrap input{
  padding-left:74px;
}

.toggle-password{
  position:absolute;
  left:8px;
  top:50%;
  transform:translateY(-50%);
  width:auto;
  height:28px;
  padding:0 10px;
  border:none;
  border-radius:6px;
  background:#2D6AF6;
  color:#ffffff;
  font-size:11px;
  font-weight:700;
  cursor:pointer;
  margin:0;
  line-height:28px;
}

.toggle-password:hover{
  opacity:0.92;
}

.verify-btn,
.create-btn,
.code-confirm-btn{
  width:100%;
  height:44px;
  border:none;
  border-radius:8px;
  font-size:14px;
  font-weight:700;
  cursor:pointer;
  margin-top:10px;
  transition:0.2s ease;
}

.verify-btn:hover,
.create-btn:hover,
.code-confirm-btn:hover{
  transform:translateY(-1px);
}

.verify-btn,
.code-confirm-btn{
  background:#2D6AF6;
  color:#ffffff;
  box-shadow:0 10px 20px rgba(45,106,246,0.2);
}

.create-btn{
  background:#10B981;
  color:#ffffff;
  box-shadow:0 10px 20px rgba(16,185,129,0.2);
}

.create-btn:disabled{
  opacity:0.5;
  cursor:not-allowed;
  transform:none;
}

.code-section{
  display:none;
  text-align:center;
  margin-top:14px;
  padding:14px 10px 6px;
  background:#eef5ff;
  border:1px solid #cfe0fb;
  border-radius:12px;
}

.code-title{
  margin:0 0 10px;
  font-size:14px;
  font-weight:700;
  color:#1A1A1A;
}

.code-box{
  display:flex;
  justify-content:center;
  gap:8px;
  margin:14px 0;
  direction:ltr;
}

.code-box input{
  width:42px;
  height:48px;
  text-align:center;
  font-size:20px;
  border-radius:10px;
  border:2px solid #d4deef;
  background:#fff;
  padding:0;
}

.code-box input:focus{
  border-color:#2D6AF6;
  box-shadow:0 0 0 3px rgba(45,106,246,0.12);
}

.timer{
  font-size:13px;
  color:#444;
  margin-top:8px;
}

.resend{
  color:#2D6AF6;
  margin-top:10px;
  display:none;
  cursor:pointer;
  font-size:13px;
  font-weight:700;
}

.status-message{
  margin-top:10px;
  font-size:13px;
  font-weight:700;
  display:none;
  text-align:center;
}

.status-success{
  color:#10B981;
}

.status-error{
  color:#e74c3c;
}

.links{
  text-align:center;
  margin-top:12px;
}

.links a{
  display:block;
  text-decoration:none;
  color:#2D6AF6;
  font-size:13px;
  font-weight:700;
  margin-top:6px;
}

.links a:hover{
  text-decoration:underline;
}

footer{
  text-align:center;
  margin-top:14px;
  font-size:11px;
  color:#314057;
  font-weight:600;
}

@media (max-width:420px){
  .container{
    max-width:100%;
    padding:20px 16px;
  }

  .logo{
    font-size:20px;
  }

  h2{
    font-size:18px;
  }

  .code-box input{
    width:40px;
    height:46px;
  }
}
</style>
</head>
<body>

<div class="container">
  <div class="logo">سودان كربتو</div>
  <div class="subtitle">منصة العملات الرقمية في السودان</div>

  <h2>إنشاء حساب</h2>

  <label>الاسم الحقيقي</label>
  <input type="text" id="fullName" placeholder="اكتب الاسم الحقيقي">

  <label>البريد الإلكتروني</label>
  <input type="email" id="email" placeholder="اكتب البريد الإلكتروني">

  <button class="verify-btn" onclick="sendCode()">تحقق من البريد الإلكتروني</button>

  <div class="code-section" id="codeSection">
    <p class="code-title">أدخل كود التحقق</p>

    <div class="code-box">
      <input type="text" maxlength="1" inputmode="numeric">
      <input type="text" maxlength="1" inputmode="numeric">
      <input type="text" maxlength="1" inputmode="numeric">
      <input type="text" maxlength="1" inputmode="numeric">
      <input type="text" maxlength="1" inputmode="numeric">
      <input type="text" maxlength="1" inputmode="numeric">
    </div>

    <button class="code-confirm-btn" onclick="verifyCode()">تأكيد الكود</button>

    <div class="timer">
      إعادة إرسال الكود خلال <span id="count">60</span> ثانية
    </div>

    <div class="resend" id="resend" onclick="sendCode()">
      إرسال كود جديد
    </div>

    <div class="status-message status-success" id="verifySuccess"></div>
    <div class="status-message status-error" id="verifyError"></div>
  </div>

  <label>الدولة</label>
  <input type="text" value="السودان 🇸🇩 (+249)" readonly>

  <label>رقم الهاتف</label>
  <input type="tel" id="phone" placeholder="مثال: 912345678">

  <label>رمز الإحالة (اختياري)</label>
  <input type="text" id="referralCode" placeholder="رمز الإحالة">

  <label>كلمة المرور</label>
  <div class="password-wrap">
    <input type="password" id="password" placeholder="كلمة المرور">
    <button type="button" class="toggle-password" onclick="togglePassword('password', this)">إظهار</button>
  </div>

  <div class="password-note">
    يجب أن تتكون كلمة المرور من 8 أحرف أو أرقام على الأقل
  </div>

  <label>تأكيد كلمة المرور</label>
  <div class="password-wrap">
    <input type="password" id="confirmPassword" placeholder="تأكيد كلمة المرور">
    <button type="button" class="toggle-password" onclick="togglePassword('confirmPassword', this)">إظهار</button>
  </div>

  <button class="create-btn" id="createBtn" onclick="createAccount()" disabled>
    إنشاء الحساب
  </button>

  <div class="status-message status-success" id="registerSuccess"></div>
  <div class="status-message status-error" id="registerError"></div>

  <div class="links">
    <a href="login.html">تسجيل الدخول</a>
  </div>

  <footer>© سودان كربتو – جميع الحقوق محفوظة</footer>
</div>

<script>
const API_BASE = "https://sudancryptomarket-api.onrender.com";

let timerInterval = null;
let emailVerified = false;

function togglePassword(inputId, button){
  const input = document.getElementById(inputId);

  if(input.type === "password"){
    input.type = "text";
    button.textContent = "إخفاء";
  } else {
    input.type = "password";
    button.textContent = "إظهار";
  }
}

function showVerifyError(message){
  const errorBox = document.getElementById("verifyError");
  const successBox = document.getElementById("verifySuccess");
  successBox.style.display = "none";
  errorBox.textContent = message;
  errorBox.style.display = "block";
}

function showVerifySuccess(message){
  const errorBox = document.getElementById("verifyError");
  const successBox = document.getElementById("verifySuccess");
  errorBox.style.display = "none";
  successBox.textContent = message;
  successBox.style.display = "block";
}

function resetVerifyMessages(){
  document.getElementById("verifyError").style.display = "none";
  document.getElementById("verifySuccess").style.display = "none";
}

function showRegisterError(message){
  const errorBox = document.getElementById("registerError");
  const successBox = document.getElementById("registerSuccess");
  successBox.style.display = "none";
  errorBox.textContent = message;
  errorBox.style.display = "block";
}

function showRegisterSuccess(message){
  const errorBox = document.getElementById("registerError");
  const successBox = document.getElementById("registerSuccess");
  errorBox.style.display = "none";
  successBox.textContent = message;
  successBox.style.display = "block";
}

function resetRegisterMessages(){
  document.getElementById("registerError").style.display = "none";
  document.getElementById("registerSuccess").style.display = "none";
}

function sendCode(){
  const email = document.getElementById("email").value.trim();

  resetVerifyMessages();
  resetRegisterMessages();

  if(email === ""){
    alert("اكتب البريد الإلكتروني أولاً");
    return;
  }

  fetch(`${API_BASE}/send-code`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ email })
  })
  .then(async (res) => {
    const data = await res.json();

    if(!res.ok || data.success === false){
      throw new Error(data.message || "فشل إرسال الكود");
    }

    document.getElementById("codeSection").style.display = "block";
    startTimer();
    alert("تم إرسال كود التحقق إلى بريدك الإلكتروني");
  })
  .catch((err) => {
    showVerifyError(err.message || "حدث خطأ أثناء إرسال الكود");
  });
}

function startTimer(){
  let time = 60;
  const count = document.getElementById("count");
  const resend = document.getElementById("resend");

  resend.style.display = "none";
  count.innerText = time;

  if(timerInterval){
    clearInterval(timerInterval);
  }

  timerInterval = setInterval(() => {
    time--;
    count.innerText = time;

    if(time <= 0){
      clearInterval(timerInterval);
      timerInterval = null;
      count.innerText = "0";
      resend.style.display = "block";
    }
  }, 1000);
}

const inputs = document.querySelectorAll(".code-box input");

inputs.forEach((input, index) => {
  input.addEventListener("input", () => {
    input.value = input.value.replace(/[^0-9]/g, "");

    if(input.value.length === 1 && index < inputs.length - 1){
      inputs[index + 1].focus();
    }
  });

  input.addEventListener("keydown", (e) => {
    if(e.key === "Backspace" && input.value === "" && index > 0){
      inputs[index - 1].focus();
    }
  });
});

function verifyCode(){
  const email = document.getElementById("email").value.trim();
  const code = Array.from(inputs).map(input => input.value).join("");

  resetVerifyMessages();
  resetRegisterMessages();

  if(email === ""){
    showVerifyError("اكتب البريد الإلكتروني");
    return;
  }

  if(code.length !== 6){
    showVerifyError("اكتب كود التحقق كاملاً");
    return;
  }

  fetch(`${API_BASE}/verify-code`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ email, code })
  })
  .then(async (res) => {
    const data = await res.json();

    if(!res.ok || data.success === false){
      throw new Error(data.message || "فشل التحقق من الكود");
    }

    emailVerified = true;
    document.getElementById("createBtn").disabled = false;
    showVerifySuccess("تم التحقق من البريد بنجاح");
  })
  .catch((err) => {
    showVerifyError(err.message || "حدث خطأ أثناء التحقق");
  });
}

function createAccount(){
  const fullName = document.getElementById("fullName").value.trim();
  const email = document.getElementById("email").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const referralCode = document.getElementById("referralCode").value.trim();
  const password = document.getElementById("password").value.trim();
  const confirmPassword = document.getElementById("confirmPassword").value.trim();

  resetRegisterMessages();

  if(!emailVerified){
    showRegisterError("يجب التحقق من البريد الإلكتروني أولاً");
    return;
  }

  if(fullName === ""){
    showRegisterError("اكتب الاسم الحقيقي");
    return;
  }

  if(email === ""){
    showRegisterError("اكتب البريد الإلكتروني");
    return;
  }

  if(phone === ""){
    showRegisterError("اكتب رقم الهاتف");
    return;
  }

  if(password === ""){
    showRegisterError("اكتب كلمة المرور");
    return;
  }

  if(password.length < 8){
    showRegisterError("كلمة المرور يجب أن تكون 8 أحرف أو أكثر");
    return;
  }

  if(confirmPassword === ""){
    showRegisterError("اكتب تأكيد كلمة المرور");
    return;
  }

  if(password !== confirmPassword){
    showRegisterError("كلمتا المرور غير متطابقتين");
    return;
  }

  fetch(`${API_BASE}/register`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      name: fullName,
      email: email,
      phone: phone,
      password: password,
      referral: referralCode
    })
  })
  .then(async (res) => {
    const data = await res.json();

    if(!res.ok || data.success === false){
      throw new Error(data.message || "فشل إنشاء الحساب");
    }

    showRegisterSuccess("تم إنشاء الحساب بنجاح");
    setTimeout(() => {
      window.location.href = "login.html";
    }, 1200);
  })
  .catch((err) => {
    showRegisterError(err.message || "حدث خطأ أثناء إنشاء الحساب");
  });
}
</script>

</body>
</html>
