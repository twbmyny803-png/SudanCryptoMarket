<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الدخل اليومي</title>

<style>

body{
margin:0;
font-family:Tahoma;
background:#f4f8ff;
}

.container{
max-width:420px;
margin:auto;
padding:15px;
position:relative;
}

.header {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 15px;
}

.back-btn {
  position: absolute;
  right: 0;
  top: 50%;
  transform: translateY(-50%);
  background: #e2e8f0;
  border: none;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #2D6AF6;
  transition: all 0.2s;
}

.back-btn:hover {
  background: #cbd5e1;
}

.title{
font-size:20px;
font-weight:bold;
margin:0;
}

.card{
background:#fff;
border-radius:14px;
padding:12px;
margin-bottom:10px;
}

.row{
display:flex;
justify-content:space-between;
margin-bottom:5px;
}

.amount{
color:#16a34a;
font-weight:bold;
}

.date{
font-size:12px;
color:#666;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<button class="back-btn" onclick="goBack()">←</button>
<div class="title">الدخل اليومي</div>
</div>

<div id="incomeList"></div>

</div>

<script>

const API="https://sudancryptomarket-api.onrender.com"
const email=localStorage.getItem("userEmail")

function goBack() {
  window.history.back();
}

if(!email){
location.href="login.html"
}

fetch(API+"/user-data",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({email})
})

.then(r=>r.json())
.then(data=>{

if(!data.success)return

const operations=data.operations||[]
const container=document.getElementById("incomeList")

const profits=operations.filter(o=>o.type==="daily_profit")

if(profits.length===0){
container.innerHTML="لا يوجد دخل بعد"
return
}

profits.forEach(op=>{

const card=document.createElement("div")
card.className="card"

card.innerHTML=`

<div class="row">
<div>الباقة</div>
<div>${data.packageName||""}</div>
</div>

<div class="row">
<div>الربح</div>
<div class="amount">${op.amount} USDT</div>
</div>

<div class="date">
${new Date(op.date).toLocaleString()}
</div>

`

container.appendChild(card)

})

})

</script>

</body>
</html>
