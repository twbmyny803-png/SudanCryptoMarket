<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الأصول | سودان كربتو</title>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:Tahoma,Arial,sans-serif;
background:#f3f6fb;
}

.header{
background:#0b1f3a;
color:#fff;
padding:18px;
text-align:center;
font-size:20px;
font-weight:700;
}

.container{
padding:16px;
max-width:600px;
margin:auto;
}

.balance-card{
background:#fff;
border-radius:14px;
padding:20px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
margin-bottom:18px;
}

.balance-title{
font-size:14px;
color:#666;
margin-bottom:8px;
}

.balance-amount{
font-size:26px;
font-weight:700;
color:#2D6AF6;
}

.actions{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-bottom:20px;
}

.card{
background:#fff;
border-radius:12px;
padding:16px;
box-shadow:0 6px 16px rgba(0,0,0,0.08);
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:translateY(-2px);
}

.card-title{
font-weight:700;
font-size:15px;
margin-bottom:6px;
color:#1A1A1A;
}

.card-desc{
font-size:12px;
color:#666;
}

.activity{
background:#fff;
border-radius:12px;
padding:16px;
box-shadow:0 6px 16px rgba(0,0,0,0.08);
}

.activity-title{
font-weight:700;
font-size:15px;
margin-bottom:10px;
}

.activity-item{
font-size:13px;
padding:8px 0;
border-bottom:1px solid #eee;
}

.activity-empty{
font-size:13px;
color:#777;
text-align:center;
padding:10px;
}
</style>
</head>

<body>

<div class="header">
الأصول
</div>

<div class="container">

<div class="balance-card">
<div class="balance-title">الرصيد الكلي</div>
<div class="balance-amount" id="balance">0 USDT</div>
</div>

<div class="actions">

<div class="card" onclick="openPage('deposit.html')">
<div class="card-title">إيداع</div>
<div class="card-desc">إضافة رصيد إلى حسابك</div>
</div>

<div class="card" onclick="openPage('withdraw.html')">
<div class="card-title">سحب</div>
<div class="card-desc">سحب الأموال إلى محفظتك</div>
</div>

<div class="card">
<div class="card-title">تحويل</div>
<div class="card-desc">سيتم إضافته لاحقاً</div>
</div>

<div class="card" onclick="openPage('transactions.html')">
<div class="card-title">سجل العمليات</div>
<div class="card-desc">عرض الإيداع والسحب</div>
</div>

</div>

<div class="activity">

<div class="activity-title">
آخر النشاط
</div>

<div id="activityBox">
<div class="activity-empty">
جاري التحميل...
</div>
</div>

</div>

</div>

<script>

const API="https://sudancryptomarket-api.onrender.com";

const email=localStorage.getItem("userEmail");

if(!email){
window.location.href="login.html";
}

fetch(API+"/user-data",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({email})
})
.then(res=>res.json())
.then(data=>{

if(!data.success){
localStorage.removeItem("userEmail");
window.location.href="login.html";
return;
}

/* عرض الرصيد */

document.getElementById("balance").innerText=(data.balance||0)+" USDT";

/* عرض آخر النشاط */

const box=document.getElementById("activityBox");

if(!data.operations || data.operations.length===0){

box.innerHTML=`<div class="activity-empty">
لا توجد عمليات حتى الآن
</div>`;

}else{

let html="";

data.operations.slice(0,5).forEach(op=>{

let text="";

if(op.type==="deposit"){
text="إيداع";
}

if(op.type==="withdraw"){
text="سحب";
}

html+=`
<div class="activity-item">
${text} ${op.amount} USDT
</div>
`;

});

box.innerHTML=html;

}

})
.catch(()=>{
window.location.href="login.html";
});

function openPage(page){
window.location.href=page;
}

</script>

</body>
</html>
