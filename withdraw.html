<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سحب | سودان كربتو</title>

<style>

body{
margin:0;
font-family:Tahoma;
background:#f2f5fa;
}

.header{
background:#0b1f3a;
color:white;
padding:18px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.container{
max-width:600px;
margin:auto;
padding:20px;
}

.card{
background:white;
border-radius:12px;
padding:18px;
margin-bottom:16px;
box-shadow:0 6px 16px rgba(0,0,0,0.08);
}

.title{
font-weight:bold;
margin-bottom:10px;
}

input,select{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ddd;
margin-top:6px;
}

.submit{
background:#10B981;
color:white;
border:none;
padding:12px;
border-radius:8px;
width:100%;
margin-top:12px;
font-size:16px;
cursor:pointer;
}

.save{
background:#2D6AF6;
color:white;
border:none;
padding:12px;
border-radius:8px;
width:100%;
margin-top:12px;
cursor:pointer;
}

.status{
text-align:center;
font-size:20px;
font-weight:bold;
color:#ff9800;
margin-top:10px;
}

.note{
font-size:13px;
color:#666;
margin-top:6px;
}

.warning{
color:#e74c3c;
font-size:13px;
margin-top:8px;
}

</style>
</head>

<body>

<div class="header">
سحب العملات
</div>

<div class="container">

<div class="card">

<div class="title">عناوين محفظة السحب</div>

<label>USDT TRC20</label>
<input type="text" id="trc20" placeholder="أدخل عنوان TRC20">

<label>USDT BEP20</label>
<input type="text" id="bep20" placeholder="أدخل عنوان BEP20">

<button class="save" onclick="saveWallets()">
حفظ العناوين
</button>

<div class="warning">
يمكنك إدخال عنوان واحد أو العنوانين. بعد الحفظ لا يمكن تعديلهم.
</div>

</div>

<div class="card">

<div class="title">اختيار الشبكة</div>

<select id="network">

<option value="">اختر الشبكة</option>

<option value="USDT TRC20">USDT TRC20</option>

<option value="USDT BEP20">USDT BEP20</option>

</select>

</div>

<div class="card">

<div class="title">المبلغ</div>

<input type="number" id="amount" placeholder="أدخل مبلغ السحب">

</div>

<div class="card">

<div class="title">كود التحقق</div>

<input type="text" id="code" placeholder="أدخل كود التحقق من البريد">

</div>

<div class="card">

<button class="submit" onclick="submitWithdraw()">
إرسال طلب السحب
</button>

<div class="status" id="status">
قيد المراجعة
</div>

<div class="note">
سيتم مراجعة الطلب خلال دقائق
</div>

</div>

</div>

<script>

function saveWallets(){

const trc=document.getElementById("trc20").value
const bep=document.getElementById("bep20").value

if(!trc && !bep){

alert("يرجى إدخال عنوان محفظة واحد على الأقل")

return

}

const wallets={

trc20:trc,

bep20:bep

}

localStorage.setItem("userWallets",JSON.stringify(wallets))

alert("تم حفظ العناوين بنجاح")

lockWalletInputs()

}

function lockWalletInputs(){

const saved=JSON.parse(localStorage.getItem("userWallets"))

if(!saved) return

document.getElementById("trc20").value=saved.trc20 || ""
document.getElementById("bep20").value=saved.bep20 || ""

document.getElementById("trc20").disabled=true
document.getElementById("bep20").disabled=true

}

window.onload=lockWalletInputs


function submitWithdraw(){

const network=document.getElementById("network").value
const amount=document.getElementById("amount").value
const code=document.getElementById("code").value

const wallets=JSON.parse(localStorage.getItem("userWallets"))

if(!wallets){

alert("يرجى إدخال عناوين المحفظة أولاً")

return

}

if(network===""){

alert("اختر الشبكة")

return

}

if(amount===""){

alert("أدخل مبلغ السحب")

return

}

if(code===""){

alert("أدخل كود التحقق")

return

}

let walletAddress=""

if(network==="USDT TRC20"){

walletAddress=wallets.trc20

}

if(network==="USDT BEP20"){

walletAddress=wallets.bep20

}

if(!walletAddress){

alert("لا يوجد عنوان محفوظ لهذه الشبكة")

return

}

const withdraw={

id:"WD"+Date.now(),

type:"سحب",

network:network,

wallet:walletAddress,

amount:amount,

status:"قيد المراجعة",

date:new Date().toLocaleString()

}

let records=JSON.parse(localStorage.getItem("records")||"[]")

records.push(withdraw)

localStorage.setItem("records",JSON.stringify(records))

document.getElementById("status").innerText="قيد المراجعة"

alert("تم إرسال طلب السحب بنجاح")

}

</script>

</body>
</html>
