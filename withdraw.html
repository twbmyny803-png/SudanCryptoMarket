<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سحب | سودان كربتو</title>

<style>
body{
margin:0;
font-family:Tahoma;
background:#f2f5fa;
}

.header{
background:#0b1f3a;
color:white;
padding:18px;
text-align:center;
font-size:20px;
font-weight:bold;
position:relative;
}

.back-btn {
  position: absolute;
  right: 18px;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(255,255,255,0.2);
  color: white;
  border: none;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}

.back-btn:hover {
  background: rgba(255,255,255,0.3);
}

.container{
max-width:600px;
margin:auto;
padding:20px;
}

.card{
background:white;
border-radius:12px;
padding:18px;
margin-bottom:16px;
box-shadow:0 6px 16px rgba(0,0,0,0.08);
}

.title{
font-weight:bold;
margin-bottom:10px;
}

input,select{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ddd;
margin-top:6px;
}

.submit{
background:#10B981;
color:white;
border:none;
padding:12px;
border-radius:8px;
width:100%;
margin-top:12px;
font-size:16px;
cursor:pointer;
}

.save{
background:#2D6AF6;
color:white;
border:none;
padding:12px;
border-radius:8px;
width:100%;
margin-top:12px;
cursor:pointer;
}

.status{
text-align:center;
font-size:20px;
font-weight:bold;
margin-top:10px;
}

.warning{
color:#e74c3c;
font-size:13px;
margin-top:8px;
}
</style>
</head>

<body>

<div class="header">
<button class="back-btn" onclick="goBack()">←</button>
سحب العملات
</div>

<div class="container">

<div class="card">
<div class="title">عناوين محفظة السحب</div>

<label>USDT TRC20</label>
<input type="text" id="trc20" placeholder="أدخل عنوان TRC20">

<label>USDT BEP20</label>
<input type="text" id="bep20" placeholder="أدخل عنوان BEP20">

<button class="save" onclick="saveWallets()">حفظ العناوين</button>

<div class="warning">
بعد الحفظ لا يمكن تعديل العنوان
</div>
</div>

<div class="card">
<div class="title">اختيار الشبكة</div>

<select id="network">
<option value="">اختر الشبكة</option>
<option value="USDT TRC20">USDT TRC20</option>
<option value="USDT BEP20">USDT BEP20</option>
</select>
</div>

<div class="card">
<div class="title">المبلغ</div>
<input type="number" id="amount" placeholder="أدخل مبلغ السحب">
</div>

<div class="card">
<div class="title">كلمة مرور السحب</div>
<input type="password" id="withdrawPass" placeholder="أدخل كلمة السحب (6 أرقام)">
</div>

<div class="card">
<button class="submit" onclick="submitWithdraw()">إرسال طلب السحب</button>
<div class="status" id="status"></div>
</div>

</div>

<script>

const API="https://sudancryptomarket-api.onrender.com";
const email=localStorage.getItem("userEmail");

function goBack() {
  window.history.back();
}

if(!email){
window.location.href="login.html";
}

/* Popup */
function showPopup(msg,color){
let div=document.createElement("div");
div.innerText=msg;
div.style.position="fixed";
div.style.bottom="20px";
div.style.left="50%";
div.style.transform="translateX(-50%)";
div.style.background=color;
div.style.color="#fff";
div.style.padding="12px 20px";
div.style.borderRadius="8px";

document.body.appendChild(div);
setTimeout(()=>div.remove(),3000);
}

/* حفظ العناوين */
function saveWallets(){

const trc=document.getElementById("trc20").value;
const bep=document.getElementById("bep20").value;

if(!trc && !bep){
showPopup("أدخل عنوان واحد على الأقل","red");
return;
}

localStorage.setItem("userWallets",JSON.stringify({
trc20:trc,
bep20:bep
}));

showPopup("تم حفظ العناوين","green");
lockWalletInputs();
}

/* قفل */
function lockWalletInputs(){

const saved=JSON.parse(localStorage.getItem("userWallets"));
if(!saved) return;

document.getElementById("trc20").value=saved.trc20 || "";
document.getElementById("bep20").value=saved.bep20 || "";

document.getElementById("trc20").disabled=true;
document.getElementById("bep20").disabled=true;
}

window.onload=lockWalletInputs;

/* السحب */
function submitWithdraw(){

const network=document.getElementById("network").value;
const amount=parseFloat(document.getElementById("amount").value);
const pass=document.getElementById("withdrawPass").value;

const wallets=JSON.parse(localStorage.getItem("userWallets"));

if(!wallets){
showPopup("احفظ العناوين أولاً","red");
return;
}

if(network===""){
showPopup("اختر الشبكة","red");
return;
}

if(!amount || amount<=0){
showPopup("مبلغ غير صحيح","red");
return;
}

if(pass.length!==6){
showPopup("كلمة السحب يجب تكون 6 أرقام","red");
return;
}

let wallet="";

if(network==="USDT TRC20"){
wallet=wallets.trc20;
}

if(network==="USDT BEP20"){
wallet=wallets.bep20;
}

if(!wallet){
showPopup("لا يوجد عنوان لهذه الشبكة","red");
return;
}

fetch(API+"/withdraw",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
email:email,
amount:amount,
network:network,
wallet:wallet,
password:pass // 🔥 تم التصحيح هنا
})
})
.then(res=>res.json())
.then(data=>{

if(data.success){

document.getElementById("status").innerText="تم إرسال الطلب";
document.getElementById("status").style.color="green";

showPopup("تم إرسال طلب السحب","green");

setTimeout(()=>{
location.reload();
},1500);

}else{

if(data.message && data.message.includes("كلمة السحب")){
window.location.href="set-withdraw-password.html";
}else{
showPopup(data.message || "فشل العملية","red");
}

}

});

}

</script>

</body>
</html>
