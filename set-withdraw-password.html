<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تعيين كلمة السحب</title>

<style>
body{
margin:0;
font-family:Tahoma;
background:#f2f5fa;
}

.container{
max-width:400px;
margin:auto;
padding:30px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 6px 16px rgba(0,0,0,0.08);
text-align:center;
}

h2{
margin-bottom:15px;
}

input{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ddd;
margin-top:10px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:8px;
background:#2D6AF6;
color:white;
font-size:16px;
cursor:pointer;
}

.note{
font-size:13px;
color:#666;
margin-top:10px;
}
</style>

</head>

<body>

<div class="container">

<div class="card">

<h2>تعيين كلمة السحب</h2>

<input type="password" id="pass" placeholder="أدخل كلمة السحب (6 أرقام)">
<input type="password" id="confirm" placeholder="تأكيد كلمة السحب">

<button onclick="savePass()">حفظ</button>

<div class="note">
⚠ لا تشارك كلمة السحب مع أي شخص
</div>

</div>

</div>

<script>

const API="https://sudancryptomarket-api.onrender.com";
const email=localStorage.getItem("userEmail");

if(!email){
window.location.href="login.html";
}

function showPopup(msg,color){
let div=document.createElement("div");
div.innerText=msg;
div.style.position="fixed";
div.style.bottom="20px";
div.style.left="50%";
div.style.transform="translateX(-50%)";
div.style.background=color;
div.style.color="#fff";
div.style.padding="12px 20px";
div.style.borderRadius="8px";

document.body.appendChild(div);
setTimeout(()=>div.remove(),3000);
}

function savePass(){

const pass=document.getElementById("pass").value;
const confirm=document.getElementById("confirm").value;

if(pass.length!==6){
showPopup("كلمة السحب يجب تكون 6 أرقام","red");
return;
}

if(pass!==confirm){
showPopup("كلمتين السر غير متطابقين","red");
return;
}

fetch(API+"/set-withdraw-password",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
email:email,
password:pass
})
})
.then(res=>res.json())
.then(data=>{

if(data.success){

showPopup("تم حفظ كلمة السحب","green");

setTimeout(()=>{
window.location.href="withdraw.html";
},1500);

}else{
showPopup(data.message||"فشل","red");
}

});

}

</script>

</body>
</html>
